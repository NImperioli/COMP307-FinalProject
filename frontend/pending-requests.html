<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 30px 40px;
        }

        h6 {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .page-header h1 {
            font-size: 42px;
            color: rgb(237, 27, 47);
        }

        .back-button {
            width: 130px;
            height: 50px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .back-button:hover {
            background: rgb(237, 27, 47);
        }

        .main-panel {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .panel-title {
            font-size: 28px;
            margin-bottom: 20px;
        }

        #requestsList {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .request-card {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            background: white;
        }

        .request-card p {
            margin-bottom: 6px;
            color: rgb(60, 60, 60);
        }

        .button-group {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        .accept-button, .decline-button {
            height: 40px;
            padding: 0 18px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            color: white;
            transition: .3s;
        }

        .accept-button {
            background: rgb(0, 0, 0);
        }

        .accept-button:hover {
            background: rgb(0, 180, 0);
        }

        .decline-button {
            background: rgb(0, 0, 0);
        }

        .decline-button:hover {
            background: rgb(237, 27, 47);
        }
    </style>
</head>

<body>
    <h6>MyBookings</h6>

    <div class="page-header">
        <h1>Pending Requests</h1>
        <button class="back-button" onclick="window.location.href='dashboard.html'">Back</button>
    </div>

    <div class="main-panel">
        <h2 class="panel-title">Requests</h2>
        <div id="requestsList"></div>
        <!---- Annie Huynh ---->
        <script>
            // check if data is there, redirect if missing or is not owner
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const id = localStorage.getItem('user._id');
            if (!token || role != 'owner' || !id ){
                window.location.href = 'login.html'
            }

            //fetch active owners on load
            async function loadRequests(){
                const url = `http://localhost:3000/api/bookings/requests/owner/${id}/pending`;

            const response = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await response.json();

            document.getElementById('requestsList').innerHTML='';
        
            for (const request of data){
                renderRequest(request);
            }
        }
        loadRequests();

        function renderRequest(request){
            const newDiv = document.createElement("div");
            newDiv.classList.add("request-card");

            const userRequest = document.createElement("p");
            userRequest.textContent = request.message;
            newDiv.appendChild(userRequest);

            const userEmail = document.createElement("p");
            userEmail.textContent = request.userEmail;
            newDiv.appendChild(userEmail);

            const buttonDiv = document.createElement("div");
            buttonDiv.classList.add("button-group");

            const accept = document.createElement("button");
            accept.classList.add("accept-button");
            accept.textContent="Accept";
            buttonDiv.appendChild(accept);

            accept.onclick = async () => {
                const response = await fetch(`${API_BASE}/api/bookings/respond`, 
                { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, 
                body: JSON.stringify({ bookingId: request._id, accepted: true }) })

                const data = await response.json();
                if (response.ok) {
                    window.open(data.notifyUser);
                    loadRequests();
                } else {
                    alert(data.error);
                }
            }

            const decline = document.createElement("button");
            decline.classList.add("decline-button");
            decline.textContent="Decline";
            buttonDiv.appendChild(decline);

            decline.onclick = async () => {
                const response = await fetch(`${API_BASE}/api/bookings/respond`, 
                { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, 
                body: JSON.stringify({ bookingId: request._id, accepted: false }) })

                const data = await response.json();
                if (response.ok) {
                    window.open(data.notifyUser);
                    loadRequests();
                } else {
                    alert(data.error);
                }
            }

            newDiv.appendChild(buttonDiv);
            document.getElementById('requestsList').appendChild(newDiv);
        }
    </script>
</body>
</html>
