<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="description" content="MyBookings: Booking Application for McGill students and employees.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 200px 40px 30px 40px;
            position: relative;
            overflow-x: hidden;
        }

        .top-bar {
            width: calc(100% - 40px);
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            padding: 16px 28px;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.16);
            z-index: 5;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: rgb(237, 27, 47);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .logo:hover { opacity: 0.8; }

        .top-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-button {
            min-width: 100px;
            height: 44px;
            background: black;
            border: none;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .top-button:hover {
            background: rgb(237, 27, 47);
            transform: translateY(-2px);
        }

        .page-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            position: relative;
            z-index: 2;
        }

        .page-header h1 {
            font-size: 42px;
            color: black;
            position: relative;
        }

        .page-header h1::after {
            content: "";
            display: block;
            width: 200px;
            height: 3px;
            background: rgb(237, 27, 47);
            margin: 1px auto 0;
            border-radius: 2px;
        }

        .dashboard-grid {
            display: flex;
            gap: 25px;
            align-items: flex-start;
            position: relative;
            z-index: 2;
        }

        .left-panel {
            flex: 2;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .right-panel {
            flex: 1;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .panel-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        .appointment-card {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            margin-bottom: 18px;
            background: rgb(255, 255, 255);
        }

        .appointment-card h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }

        .appointment-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 6px;
        }

        .type-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        .badge-slot     { background: rgb(220, 255, 220); color: rgb(30, 130, 30); }
        .badge-req      { background: rgb(255, 240, 200); color: rgb(150, 80, 0); }
        .badge-group    { background: rgb(230, 240, 255); color: rgb(30, 80, 180); }
        .badge-completed { background: rgb(220, 255, 220); color: rgb(30, 130, 30); }

        

        .small-button {
            height: 42px;
            padding: 0 18px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
            font-size: 14px;
            font-family: "Outfit", sans-serif;
        }

        .small-button:hover { background: rgb(237, 27, 47); }

        .small-button-red {
            height: 42px;
            padding: 0 18px;
            background: rgb(200, 50, 50);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
            font-size: 14px;
            font-family: "Outfit", sans-serif;
        }

        .small-button-red:hover { background: rgb(237, 27, 47); }

        .action-button {
            width: 100%;
            height: 55px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-bottom: 14px;
            transition: .3s;
            font-size: 15px;
            font-family: "Outfit", sans-serif;
            position: relative;
            overflow: hidden;
        }

        .action-button:hover { background: rgb(237, 27, 47); }

        .action-button::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .action-button:hover::after { left: 100%; }

        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 480px;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
            animation: waveMove 12s linear infinite;
        }

        .wave-svg { width: 100%; height: 100%; display: block; }

        .wave-back {
            bottom: -40px;
            height: 620px;
            opacity: 0.45;
            animation-duration: 18s;
        }

        .wave-back .wave-svg {
            transform: scaleY(1.2);
            transform-origin: bottom;
        }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        .empty-state {
            color: gray;
            text-align: center;
            padding: 20px;
        }

     .card-actions {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-start;
}

    body {
        padding: 170px 14px 24px 14px;
    }

    .top-bar {

    .small-button,
    .small-button-red {
        flex: 1 1 auto;

    }

    .action-button {
        height: 50px;
    }

     .card-actions {
        width: 100%;
        gap: 8px;
        flex-direction: column;
    }

    .card-actions button {
    width: 100%;
}


}

@media (max-width: 480px) {

        }

        .request-card p {

        }

        .accept-button, .decline-button {

        .accept-button          { background: rgb(0, 0, 0); }
        .accept-button:hover    { background: rgb(237, 27, 47); }
        .decline-button         { background: rgb(150, 150, 150); }
        .decline-button:hover   { background: rgb(237, 27, 47); }

        .completed-badge {
            display: inline-block;
            padding: 5px 14px;
            background: rgb(220, 255, 220);
            color: rgb(22, 101, 52);
            border-radius: 20px;

            margin-top: 10px;
        }

<body>

        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.3"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="wave-bg">
        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.8"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="top-bar">
        <a href="landing.html" class="logo">MyBookings</a>
        <div class="top-buttons">
            <span id="user-name"></span>
            <button class="top-button" onclick="logout()">Logout</button>

    <div class="dashboard-grid">
        <div class="left-panel">
            <h2 class="panel-title">My Appointments</h2>
            <div id="appointmentsList"></div>
        </div>
        <div class="right-panel" id="actions-menu">

            <button class="action-button" id="viewRequestsBtn" onclick="openMyRequestsModal()">View My Requests</button>
        </div>

    <!-- Owner pending requests modal -->

        <div class="modal-box">
            <button class="modal-close" onclick="closePendingModal()">&#10005;</button>
            <h2 class="panel-title">Pending Requests</h2>
            <div id="requestsList"></div>
        </div>
    </div>

    <!-- Student request view -->
    <div class="modal-overlay" id="myRequestsModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeMyRequestsModal()">&#10005;</button>
            <h2 class="panel-title">My Requests</h2>

    <script>
        const API_BASE         = '';
        const token            = localStorage.getItem('token');
        const role             = localStorage.getItem('role');
        const name             = localStorage.getItem('name');
        const id               = localStorage.getItem('user._id');
        const appointmentsList = document.getElementById('appointmentsList');
        const actionsBar       = document.getElementById('actions-menu');

        if (!token) window.location.href = 'login.html';

        document.getElementById('user-name').textContent = name || '';

        /* ─── logout ─── */
        async function logout() {
            try {
                await fetch(`${API_BASE}/api/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            } catch (e) {}
            localStorage.clear();
            window.location.href = 'landing.html';
        }

        /* ─── helpers ─── */
        function renderAction(label, href) {
            const btn = document.createElement('button');
            btn.classList.add('action-button');
            btn.textContent = label;
            btn.onclick = () => { window.location.href = href; };
            actionsBar.appendChild(btn);
        }

        /* Mark a card as completed in-place without reloading */
        function markCardCompleted(card) {
            // Remove all action buttons
            const actions = card.querySelector('.card-actions');
            if (actions) actions.remove();
            // Add completed badge
            const badge = document.createElement('span');
            badge.classList.add('completed-badge');
            badge.textContent = '✓ Marked as Completed';
            card.appendChild(badge);
            card.style.opacity = '0.7';
        }

        /* ─── main loader ─── */
        async function loadDashboard() {
            document.querySelectorAll('#actions-menu .action-button').forEach(btn => {
                if (btn.id !== 'viewRequestsBtn') btn.remove();
            });
            appointmentsList.innerHTML = '';

            // Slot reservations
            const slotsUrl = role === 'owner'
                ? `${API_BASE}/api/slots/owner/${id}/reservations`
                : `${API_BASE}/api/slots/my-reservations/${id}`;

            try {
                const r = await fetch(slotsUrl, { headers: { 'Authorization': 'Bearer ' + token } });
            const d = await r.json();
            if (Array.isArray(d)) {
                if (role === 'owner') {
                    // Group recurring slot reservations so one card shows per group
                    const groupMap = new Map();
                    const singles = [];
                    for (const item of d) {
                        const gToken = item.slot && item.slot.groupToken;
                        if (gToken) {
                            if (!groupMap.has(gToken)) {
                                groupMap.set(gToken, { ...item, bookers: [], reservationIds: [] });
                            }
                            const entry = groupMap.get(gToken);
                            if (item.user && item.user.email && !entry.bookers.includes(item.user.email)) {
                                entry.bookers.push(item.user.email);
                            }
                            if (item._id && !entry.reservationIds.includes(item._id.toString())) {
                                entry.reservationIds.push(item._id.toString());
                            }
                            // Only mark completed if ALL reservations in group are completed
                            if (item.status !== 'completed') entry._anyActive = true;
                            if (item.cancelledAt) entry.cancelledAt = item.cancelledAt;
                        } else {
                            singles.push(item);
                        }
                    }
                    // Post-process: only mark group as completed if no active reservations remain
                    for (const [, entry] of groupMap) {
                        delete entry._anyActive;
                        // Only mark completed if every reservation in this group is completed/cancelled
                        const groupItems = d.filter(i => i.slot && i.slot.groupToken === entry.slot?.groupToken);
                        const allDone = groupItems.every(i => i.status === 'completed' || i.cancelledAt);
                        if (allDone) entry.status = 'completed';
                    }
                    for (const [token, entry] of groupMap) {
                    // find the earliest active (non-completed) slot in the group
                    const activeItems = d.filter(i => 
                        i.slot && i.slot.groupToken === token && 
                        i.status !== 'completed' &&
                        !i.cancelledAt
                    );
                    if (activeItems.length > 0) {
                        const earliest = activeItems.sort((a, b) => 
                            new Date(a.slot.startTime) - new Date(b.slot.startTime)
                        )[0];
                        entry.slot = earliest.slot;
                        entry._id = earliest._id;
                    }
                }
                    for (const item of singles) renderCard(item);
                    for (const item of groupMap.values()) renderCard(item);
                } else {
                    for (const item of d) renderCard(item);
                }
            }
            } catch (e) { console.error('Failed to load slot reservations:', e); }

            // Type 1 + Type 2
            const apptUrl = role === 'owner'
                ? `${API_BASE}/api/bookings/appointments/owner/${id}`
                : `${API_BASE}/api/bookings/appointments/user/${id}`;

          // Type 1 + Type 2 appointments
            try {
                const apptUrl = role === 'owner'
                    ? `${API_BASE}/api/bookings/appointments/owner/${id}`
                    : `${API_BASE}/api/bookings/appointments/user/${id}`;
                const r2 = await fetch(apptUrl, { headers: { 'Authorization': 'Bearer ' + token } });
                const d2 = await r2.json();
                const type1 = d2.type1 || [];
                const type2 = d2.type2 || [];
                for (const item of type1) renderType1Card(item);
                for (const item of type2) renderType2Card(item);
                if (role === 'owner') {
                    const sentRes = await fetch(`${API_BASE}/api/bookings/requests/user/${id}`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const sentData = await sentRes.json();

                    for (const item of (sentData || []).filter(r => r.status === 'approved')) {
                        renderType1Card(item);
                    }
                }
            } catch (e) { console.error('Failed to load appointments:', e); }

            if (appointmentsList.children.length === 0) {
                const empty = document.createElement('p');
                empty.classList.add('empty-state');
                empty.textContent = 'No appointments yet.';
                appointmentsList.appendChild(empty);
            }

            // Sidebar buttons
            if (role === 'owner') {
                document.getElementById('viewRequestsBtn').style.display = 'none';
                renderAction('Manage Slots', 'owner-manage-slots.html');
                renderAction('Browse & Request Meetings', 'browse-owners.html');

                const exportAllBtn = document.createElement('button');
                exportAllBtn.classList.add('action-button');
                exportAllBtn.textContent = 'Export All to Calendar';
                exportAllBtn.onclick = () => {
                    fetch(`${API_BASE}/api/ical/owner/${id}/all`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                    .then(r => r.blob())
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = 'all-events.ics';
                        a.click();
                        URL.revokeObjectURL(a.href);
                    })
                    .catch(e => alert('Export failed: ' + e.message));
                };
                actionsBar.appendChild(exportAllBtn);

                const pendingBtn = document.createElement('button');
                pendingBtn.classList.add('action-button');
                pendingBtn.textContent = 'View Pending Requests';
                pendingBtn.onclick = () => openPendingModal();
                actionsBar.appendChild(pendingBtn);

            } else {
                document.getElementById('viewRequestsBtn').style.display = '';
                renderAction('Book Another Appointment', 'browse-owners.html');

                const exportAllBtn = document.createElement('button');
                exportAllBtn.classList.add('action-button');
                exportAllBtn.textContent = 'Export All to Calendar';
                exportAllBtn.onclick = () => {
                    fetch(`${API_BASE}/api/slots/my-reservations/${id}/export.ics`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                    .then(r => r.blob())
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = 'my-bookings.ics';
                        a.click();
                    })
                    .catch(e => alert('Export failed: ' + e.message));
                };
                actionsBar.appendChild(exportAllBtn);
            }
        }

        /* ─── Slot reservation card (Type 0/3) ─── */
        function renderCard(item) {
        const card = document.createElement('div');
        card.classList.add('appointment-card');

        const badge = document.createElement('span');
        badge.classList.add('type-badge', 'badge-slot');
        badge.textContent = (item.slot && item.slot.type === 'recurring') 
            ? `Recurring Slot${item.bookers && item.bookers.length > 1 ? ' (' + item.bookers.length + ' students)' : ''}` 
            : 'Booking Slot';
        card.appendChild(badge);

        const heading = document.createElement('h3');
        heading.textContent = item.slot ? item.slot.title : '(no title)';
        card.appendChild(heading);

        const time = document.createElement('p');
        time.textContent = 'Time: '
            + (item.slot ? new Date(item.slot.startTime).toLocaleString() : '')
            + ' — '
            + (item.slot ? new Date(item.slot.endTime).toLocaleString() : '');
        card.appendChild(time);

        const statusP = document.createElement('p');
        statusP.textContent = 'Status: ' + (item.status || '');
        card.appendChild(statusP);

        const buttonDiv = document.createElement('div');
        buttonDiv.classList.add('card-actions');

        const isCancelled = item.status === 'cancelled' || item.cancelledAt;
        const isCompleted = item.status === 'completed';

        if (isCancelled) {
            const cancelledBadge = document.createElement('span');
            cancelledBadge.classList.add('completed-badge');
            cancelledBadge.style.background = 'rgb(255,220,220)';
            cancelledBadge.style.color = 'rgb(150,30,30)';
            cancelledBadge.textContent = '✗ Cancelled';
            card.appendChild(cancelledBadge);
            card.style.opacity = '0.55';
        }

        else if (isCompleted) {
            const completedBadge = document.createElement('span');
            completedBadge.classList.add('completed-badge');
            completedBadge.textContent = '✓ Completed';
            card.appendChild(completedBadge);
            card.style.opacity = '0.65';
        }

        else {
            if (role === 'owner') {

        const bookedBy = document.createElement('p');
        if (item.bookers && item.bookers.length > 0) {
            bookedBy.textContent = 'Booked by: ' + item.bookers.join(', ');
        } else {
            bookedBy.textContent = 'Booked by: ' + (item.user ? item.user.email : 'Unknown');
        }
        card.appendChild(bookedBy);

        // Message
        const messageBooker = document.createElement('button');
        messageBooker.classList.add('small-button');
        messageBooker.textContent = 'Message';
        messageBooker.onclick = async () => {
            const res = await fetch(`${API_BASE}/api/slots/${item.slot._id}/message-booker`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (res.ok) window.location.href = data.mailto;
            else alert(data.error);
        };
        buttonDiv.appendChild(messageBooker);

        const cancelBtn = document.createElement('button');
        cancelBtn.classList.add('small-button-red');
        cancelBtn.textContent = item.reservationIds && item.reservationIds.length > 1
            ? 'Cancel Entire Series'
            : 'Cancel Booking';

        cancelBtn.onclick = async () => {
            const confirmMsg = item.reservationIds && item.reservationIds.length > 1
                ? 'Cancel ALL bookings in this recurring series?'
                : 'Cancel this booking?';

            if (!confirm(confirmMsg)) return;

            const ids = item.reservationIds && item.reservationIds.length > 0
                ? item.reservationIds
                : [item._id];

            const results = await Promise.all(ids.map(bid =>
                fetch(`${API_BASE}/api/slots/cancel`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ reservationId: bid })
                })
            ));

            const resultData = await Promise.all(results.map(r => r.json()));


 if (results.every(r => r.ok)) {
    resultData.forEach(d => {

        // OLD behavior (kept)
        if (d.notifyUser) window.open(d.notifyUser, '_blank');

        // NEW: handle multiple student emails properly
        if (Array.isArray(d.notify)) {
            d.notify.forEach(url => {
                if (url) window.open(url, '_blank');
            });
        }

        // NEW: fallback if backend doesn't send notify[]
        if (!d.notify && item.bookers && item.bookers.length > 0) {
            const emails = item.bookers.join(',');
            const subject = encodeURIComponent('Booking Cancelled');
            const body = encodeURIComponent('Your booking has been cancelled by the owner.');

            window.location.href = `mailto:${emails}?subject=${subject}&body=${body}`;
        }
    });

    loadDashboard();
} else {
    alert('Cancel failed for one or more reservations');
}
        };

        buttonDiv.appendChild(cancelBtn);

        // COMPLETE
        const completeBtn = document.createElement('button');
        completeBtn.classList.add('small-button');
        completeBtn.textContent = 'Mark as Completed';
        completeBtn.onclick = async () => {
            const ids = item.reservationIds && item.reservationIds.length > 0
                ? item.reservationIds
                : [item._id];

            const results = await Promise.all(ids.map(bid =>
                fetch(`${API_BASE}/api/bookings/complete`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ bookingId: bid, type: 'TYPE_SLOT' })
                })
            ));

            if (results.every(r => r.ok)) markCardCompleted(card);
            else alert('Complete failed for one or more reservations');
        };
        buttonDiv.appendChild(completeBtn);

        // Export
        const exportBtn = document.createElement('button');
        exportBtn.classList.add('small-button');
        exportBtn.textContent = 'Export .ics';
        exportBtn.onclick = () => exportSlotICS(item.slot._id);
        buttonDiv.appendChild(exportBtn);
    } else {

                // Message Owner
                const messageOwner = document.createElement('button');
                messageOwner.classList.add('small-button');
                messageOwner.textContent = 'Message';
                messageOwner.onclick = async () => {
                    const res = await fetch(`${API_BASE}/api/slots/${item.slot._id}/message-owner`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (res.ok) window.location.href = data.mailto;
                    else alert(data.error);
                };
                buttonDiv.appendChild(messageOwner);

                const cancelBtn = document.createElement('button');
                cancelBtn.classList.add('small-button-red');
                cancelBtn.textContent = 'Cancel';
                cancelBtn.onclick = async () => {
                    if (!confirm('Cancel this booking?')) return;

                    const res = await fetch(`${API_BASE}/api/slots/cancel`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({
                            reservationId: item._id   
                        })
                    });

                    const cancelData = await res.json();

                    if (res.ok) {
                        if (cancelData.notifyOwner) window.open(cancelData.notifyOwner, '_blank');
                        loadDashboard();
                    } else {
                        alert(cancelData.error);
                    }
                };
                buttonDiv.appendChild(cancelBtn);

                // Complete
                const completeBtn = document.createElement('button');
                completeBtn.classList.add('small-button');
                completeBtn.textContent = 'Mark as Completed';
                completeBtn.onclick = async () => {
                    const res = await fetch(`${API_BASE}/api/bookings/complete`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ bookingId: item._id, type: 'TYPE_SLOT' })
                    });

                    if (res.ok) markCardCompleted(card);
                    else {
                        const d = await res.json();
                        alert(d.error || 'Complete failed');
                    }
                };
                buttonDiv.appendChild(completeBtn);

                // Export
                const exportBtn = document.createElement('button');
                exportBtn.classList.add('small-button');
                exportBtn.textContent = 'Export .ics';
                exportBtn.onclick = () => exportSlotICS(item.slot._id);
                buttonDiv.appendChild(exportBtn);
            }
        }

        card.appendChild(buttonDiv);
        appointmentsList.appendChild(card);
    }

        function exportSlotICS(slotId) {
            fetch(`${API_BASE}/api/slots/${slotId}/export.ics`, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(r => r.blob())
            .then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'appointment.ics';
                a.click();
                URL.revokeObjectURL(a.href);
            });
        }

        /* ─── Type 1 card ─── */
        function renderType1Card(item) {
            const card = document.createElement('div');
            card.classList.add('appointment-card');

            const isPast = item.proposedTime && new Date(item.proposedTime) < new Date();
            const isCompleted = item.status === 'completed';

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-req');
            badge.textContent = (isPast || isCompleted) ? 'Meeting — Completed' : 'Meeting Request';
            card.appendChild(badge);

            const h = document.createElement('h3');
            h.textContent = item.title || 'Meeting Request';
            card.appendChild(h);

            const other = document.createElement('p');
            if (role === 'owner') {
                if (item.userId === id) {
                    // owner SENT the request
                    other.textContent = 'With: ' + item.ownerEmail;
                } else {
                    // owner RECEIVED the request
                    other.textContent = 'From: ' + item.userEmail;
                }
            } else {
                other.textContent = 'With: ' + item.ownerEmail;
            }
            card.appendChild(other);

            if (item.proposedTime) {
                const t = document.createElement('p');
                t.textContent = 'Time: ' + new Date(item.proposedTime).toLocaleString();
                card.appendChild(t);
            }

            const statusP = document.createElement('p');
            statusP.textContent = 'Status: ' + item.status;
            card.appendChild(statusP);

            if (isPast || isCompleted) {
                const completedBadge = document.createElement('span');
                completedBadge.classList.add('completed-badge');
                completedBadge.textContent = '✓ Completed';
                card.appendChild(completedBadge);
                card.style.opacity = '0.55';
                appointmentsList.appendChild(card);
                return;
            }

            const buttonDiv = document.createElement('div');
            buttonDiv.classList.add('card-actions');

            if (item.status === 'approved') {
                const msgBtn = document.createElement('button');
                msgBtn.classList.add('small-button');
                msgBtn.textContent = 'Message';
                msgBtn.onclick = () => {
                    let targetEmail;

                    if (role === 'owner') {
                        const isSender = item.userEmail === name || item.userEmail === localStorage.getItem('email');

                        // If YOU sent it → message the OTHER owner
                        if (isSender) {
                            targetEmail = item.ownerEmail;
                        } else {
                            targetEmail = item.userEmail;
                        }
                    } else {
                        targetEmail = item.ownerEmail;
                    }

                    window.location.href =
                        `mailto:${targetEmail}?subject=${encodeURIComponent('Re: ' + (item.title || 'Meeting'))}`;
                };
                buttonDiv.appendChild(msgBtn);
            }

            const cancelBtn = document.createElement('button');
            cancelBtn.classList.add('small-button-red');
            cancelBtn.textContent = role === 'owner' ? 'Cancel Meeting' : 'Cancel Request';
            cancelBtn.onclick = async () => {
                if (!confirm('Cancel this meeting?')) return;
                const res = await fetch(`${API_BASE}/api/bookings/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: item._id, type: 'TYPE1' })
                });
                if (res.ok) {
    const d = await res.json();

    if (d.notifyUser) window.open(d.notifyUser, '_blank');
    if (Array.isArray(d.notify)) {
        d.notify.forEach(url => window.open(url, '_blank'));
    }

    loadDashboard();
}
                else { const d = await res.json(); alert(d.error); }
            };
            buttonDiv.appendChild(cancelBtn);

            const completeBtn = document.createElement('button');
            completeBtn.classList.add('small-button');
            completeBtn.textContent = 'Mark as Completed';
            completeBtn.onclick = async () => {
                const res = await fetch(`${API_BASE}/api/bookings/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: item._id, type: 'TYPE1' })
                });
                if (res.ok) markCardCompleted(card);
                else { const d = await res.json(); alert(d.error || 'Complete failed'); }
            };
            buttonDiv.appendChild(completeBtn);

            card.appendChild(buttonDiv);
            if (isPast) card.style.opacity = '0.55';
            appointmentsList.appendChild(card);
        }

        /* ─── Type 2 card ─── */
        function renderType2Card(item) {
            const card = document.createElement('div');
            card.classList.add('appointment-card');

            const isPast = new Date(item.time) < new Date();
            const isCompleted = item.status === 'completed';

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-group');
            badge.textContent = 'Group Meeting';
            card.appendChild(badge);

            const heading = document.createElement('h3');
            heading.textContent = item.title || 'Group Meeting';
            card.appendChild(heading);

            const time = document.createElement('p');
            time.textContent = 'Time: ' + new Date(item.time).toLocaleString();
            card.appendChild(time);

            if (item.isRecurring) {
                const week = document.createElement('p');
                week.textContent = 'Week ' + item.weekNumber + ' of recurring series';
                card.appendChild(week);
            }

            const organizer = document.createElement('p');
            organizer.textContent = 'Organizer: ' + (item.ownerEmail || 'Unknown');
            card.appendChild(organizer);

            if (isPast || isCompleted) {
                const completedBadge = document.createElement('span');
                completedBadge.classList.add('completed-badge');
                completedBadge.textContent = '✓ Completed';
                card.appendChild(completedBadge);
                card.style.opacity = '0.55';

                appointmentsList.appendChild(card);
                return;
            }

            const buttonDiv = document.createElement('div');
            buttonDiv.classList.add('card-actions');

            const msgBtn = document.createElement('button');
            msgBtn.classList.add('small-button');
            msgBtn.textContent = role === 'owner' ? 'Message Participants' : 'Message Organizer';
            msgBtn.onclick = () => {
                const target = role === 'owner'
                    ? (item.participants || []).join(',')  // owner messages participants
                    : item.ownerEmail;                     // student messages owner
                window.location.href = `mailto:${target}`;
            };
            buttonDiv.appendChild(msgBtn);

            const cancelBtn = document.createElement('button');
            cancelBtn.classList.add('small-button-red');
            cancelBtn.textContent = role === 'owner' ? 'Cancel Meeting' : 'Leave Meeting';
            cancelBtn.onclick = async () => {
            const confirmMsg = role === 'owner'
                ? 'Cancel ONLY this week’s meeting?'
                : 'Leave ONLY this week’s meeting?';

            if (!confirm(confirmMsg)) return;

            const res = role === 'owner'
                ? await fetch(`${API_BASE}/api/bookings/cancel`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    // ✅ THIS IS THE KEY: cancel ONLY this occurrence
                    body: JSON.stringify({
                        bookingId: item._id,
                        type: 'TYPE2',
                        scope: 'single'   // 👈 add this flag
                    })
                })
                : await fetch(`${API_BASE}/api/bookings/group/${item._id}/leave`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

            if (res.ok) {
    const d = await res.json();

    if (d.notifyUser) window.open(d.notifyUser, '_blank');
    if (Array.isArray(d.notify)) {
        d.notify.forEach(url => window.open(url, '_blank'));
    }

    loadDashboard();
} else {
                const d = await res.json();
                alert(d.error);
            }
        };
            buttonDiv.appendChild(cancelBtn);

            // FIX: complete passes type: TYPE2 so controller routes to appointments collection
            const completeBtn = document.createElement('button');
            completeBtn.classList.add('small-button');
            completeBtn.textContent = 'Mark as Completed';
            completeBtn.onclick = async () => {
                const res = await fetch(`${API_BASE}/api/bookings/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: item._id, type: 'TYPE2' })
                });
                if (res.ok) {
                    markCardCompleted(card);
                } else {
                    const d = await res.json();
                    alert(d.error || 'Complete failed');
                }
            };
            buttonDiv.appendChild(completeBtn);

            const exportBtn = document.createElement('button');
            exportBtn.classList.add('small-button');
            exportBtn.textContent = 'Export .ics';
            exportBtn.onclick = () => exportGroupICS(item._id);
            buttonDiv.appendChild(exportBtn);

            card.appendChild(buttonDiv);
            appointmentsList.appendChild(card);
        }

        function exportGroupICS(appointmentId) {
            fetch(`${API_BASE}/api/ical/group/${appointmentId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(r => r.blob())
            .then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'group-meeting.ics';
                a.click();
                URL.revokeObjectURL(a.href);
            })
            .catch(e => alert('Export failed: ' + e.message));
        }

        /* ─── Owner pending requests modal ─── */
        function openPendingModal() {
            document.getElementById('pendingModal').classList.add('active');
            loadRequests();
        }

        function closePendingModal() {
            document.getElementById('pendingModal').classList.remove('active');
        }

        async function loadRequests() {
            const list = document.getElementById('requestsList');
            list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">Loading…</p>';
            try {
                const res = await fetch(`${API_BASE}/api/bookings/requests/owner/${id}/pending`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                list.innerHTML = '';
                if (!Array.isArray(data) || data.length === 0) {
                    list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">No pending requests.</p>';
                    return;
                }
                for (const request of data) renderRequest(request);
            } catch (e) {
                list.innerHTML = '<p style="color:red;text-align:center;padding:20px">Failed to load requests.</p>';
            }
        }

        function renderRequest(request) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('request-card');

            const fromP = document.createElement('p');
            fromP.textContent = 'From: ' + request.userEmail;
            newDiv.appendChild(fromP);

            const msgP = document.createElement('p');
            msgP.textContent = request.message;
            newDiv.appendChild(msgP);

            if (request.proposedTime) {
                const timeP = document.createElement('p');
                timeP.textContent = 'Proposed time: ' + new Date(request.proposedTime).toLocaleString();
                newDiv.appendChild(timeP);
            }

            const buttonDiv = document.createElement('div');
            const accept  = document.createElement('button');
            accept.classList.add('accept-button');
            accept.textContent = 'Accept';

            const decline = document.createElement('button');
            decline.classList.add('decline-button');
            decline.textContent = 'Decline';

            accept.onclick = async () => {
                const res = await fetch(`${API_BASE}/api/bookings/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: request._id, accepted: true })
                });
                const data = await res.json();
                if (res.ok) {
                    await loadRequests();
                    await loadDashboard();
                    if (data.notifyUser) window.open(data.notifyUser, '_blank');
                } else {
                    alert(data.error);
                }
            };

            decline.onclick = async () => {
                const res = await fetch(`${API_BASE}/api/bookings/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: request._id, accepted: false })
                });
                const data = await res.json();
                if (res.ok) {
                    await loadRequests();
                    if (data.notifyUser) window.open(data.notifyUser, '_blank');
                } else {
                    alert(data.error);
                }
            };

            buttonDiv.appendChild(accept);
            buttonDiv.appendChild(decline);
            newDiv.appendChild(buttonDiv);
            document.getElementById('requestsList').appendChild(newDiv);
        }

        /* ─── Student "My Requests" modal ─── */
        function openMyRequestsModal() {
            document.getElementById('myRequestsModal').classList.add('active');
            loadMyRequests();
        }

        function closeMyRequestsModal() {
            document.getElementById('myRequestsModal').classList.remove('active');
        }

        async function loadMyRequests() {
            const list = document.getElementById('myRequestsList');
            list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">Loading…</p>';
            try {
                const res = await fetch(`${API_BASE}/api/bookings/requests/user/${id}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                list.innerHTML = '';
                if (!Array.isArray(data) || data.length === 0) {
                    list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">No requests yet.</p>';
                    return;
                }
                for (const req of data) renderMyRequest(req);
            } catch (e) {
                list.innerHTML = '<p style="color:red;text-align:center;padding:20px">Failed to load requests.</p>';
            }
        }

        function renderMyRequest(request) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('request-card');

            const toP = document.createElement('p');
            toP.textContent = 'To: ' + request.ownerEmail;
            newDiv.appendChild(toP);

            const msgP = document.createElement('p');
            msgP.textContent = request.message;
            newDiv.appendChild(msgP);

            if (request.proposedTime) {
                const timeP = document.createElement('p');
                timeP.textContent = 'Proposed time: ' + new Date(request.proposedTime).toLocaleString();
                newDiv.appendChild(timeP);
            }

            const statusP = document.createElement('p');
            statusP.textContent = 'Status: ' + request.status;
            newDiv.appendChild(statusP);

            document.getElementById('myRequestsList').appendChild(newDiv);
        }

        loadDashboard();
    </script>
</body>
</html>
