<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="description" content="MyBookings: Booking Application for McGill students and employees.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 200px 40px 30px 40px;
            position: relative;
            overflow-x: hidden;
        }

        .top-bar {
            width: calc(100% - 40px);
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            padding: 16px 28px;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.16);
            z-index: 5;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: rgb(237, 27, 47);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .logo:hover { opacity: 0.8; }

        .top-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-button {
            min-width: 100px;
            height: 44px;
            background: black;
            border: none;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .top-button:hover {
            background: rgb(237, 27, 47);
            transform: translateY(-2px);
        }

        .page-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            position: relative;
            z-index: 2;
        }

        .page-header h1 {
            font-size: 42px;
            color: black;
            position: relative;
        }

        .page-header h1::after {
            content: "";
            display: block;
            width: 200px;
            height: 3px;
            background: rgb(237, 27, 47);
            margin: 1px auto 0;
            border-radius: 2px;
        }

        .dashboard-grid {
            display: flex;
            gap: 25px;
            align-items: flex-start;
            position: relative;
            z-index: 2;
        }

        .left-panel {
            flex: 2;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .right-panel {
            flex: 1;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .panel-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        .appointment-card {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            margin-bottom: 18px;
            background: rgb(255, 255, 255);
        }

        .appointment-card h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }

        .appointment-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 6px;
        }

        .type-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        .badge-slot  { background: rgb(220, 255, 220); color: rgb(30, 130, 30); }
        .badge-req   { background: rgb(255, 240, 200); color: rgb(150, 80, 0); }
        .badge-group { background: rgb(230, 240, 255); color: rgb(30, 80, 180); }

        .card-actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .small-button {
            height: 42px;
            padding: 0 18px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
            font-size: 14px;
            font-family: "Outfit", sans-serif;
        }

        .small-button:hover { background: rgb(237, 27, 47); }

        .small-button-red {
            height: 42px;
            padding: 0 18px;
            background: rgb(200, 50, 50);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
            font-size: 14px;
            font-family: "Outfit", sans-serif;
        }

        .small-button-red:hover { background: rgb(237, 27, 47); }

        .action-button {
            width: 100%;
            height: 55px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-bottom: 14px;
            transition: .3s;
            font-size: 15px;
            font-family: "Outfit", sans-serif;
            position: relative;
            overflow: hidden;
        }

        .action-button:hover { background: rgb(237, 27, 47); }

        .action-button::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .action-button:hover::after { left: 100%; }

        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 480px;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
            animation: waveMove 12s linear infinite;
        }

        .wave-svg { width: 100%; height: 100%; display: block; }

        .wave-back {
            bottom: -40px;
            height: 620px;
            opacity: 0.45;
            animation-duration: 18s;
        }

        .wave-back .wave-svg {
            transform: scaleY(1.2);
            transform-origin: bottom;
        }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        .empty-state {
            color: gray;
            text-align: center;
            padding: 20px;
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 30px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: black;
        }

        .modal-close:hover { color: rgb(237, 27, 47); }

        .request-card {
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            margin-bottom: 14px;
        }

        .request-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 8px;
        }

        .accept-button, .decline-button {
            height: 40px;
            padding: 0 16px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: .3s;
            margin-right: 8px;
            margin-top: 8px;
            font-family: "Outfit", sans-serif;
        }

        .accept-button          { background: rgb(0, 0, 0); }
        .accept-button:hover    { background: rgb(237, 27, 47); }
        .decline-button         { background: rgb(150, 150, 150); }
        .decline-button:hover   { background: rgb(237, 27, 47); }
    </style>
</head>

<body>
    <div class="wave-bg wave-back">
        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.3"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="wave-bg">
        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.8"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="top-bar">
        <a href="landing.html" class="logo">MyBookings</a>
        <div class="top-buttons">
            <span id="user-name"></span>
            <button class="top-button" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="page-header">
        <h1>Dashboard</h1>
    </div>

    <div class="dashboard-grid">
        <div class="left-panel">
            <h2 class="panel-title">My Appointments</h2>
            <div id="appointmentsList"></div>
        </div>
        <div class="right-panel" id="actions-menu">
            <h2 class="panel-title">Actions</h2>
            <!-- Static button: always present for students, hidden for owners -->
            <button class="action-button" id="viewRequestsBtn" onclick="openMyRequestsModal()">View My Requests</button>
        </div>
    </div>

    <!-- Owner pending requests modal -->
    <div class="modal-overlay" id="pendingModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closePendingModal()">&#10005;</button>
            <h2 class="panel-title">Pending Requests</h2>
            <div id="requestsList"></div>
        </div>
    </div>

    <!-- Student request view -->
    <div class="modal-overlay" id="myRequestsModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeMyRequestsModal()">&#10005;</button>
            <h2 class="panel-title">My Requests</h2>
            <div id="myRequestsList"></div>
        </div>
    </div>

    <script>
        const API_BASE         = '';
        const token            = localStorage.getItem('token');
        const role             = localStorage.getItem('role');
        const name             = localStorage.getItem('name');
        const id               = localStorage.getItem('user._id');
        const appointmentsList = document.getElementById('appointmentsList');
        const actionsBar       = document.getElementById('actions-menu');

        if (!token) {
            window.location.href = 'login.html';
        }

        document.getElementById('user-name').textContent = name || '';

        /* ─── logout ─── */
        async function logout() {
            try {
                await fetch(`${API_BASE}/api/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            } catch (e) { /* ignore network errors on logout */ }
            localStorage.clear();
            window.location.href = 'landing.html';
        }

        /* ─── helper: add action button to sidebar ─── */
        function renderAction(label, href) {
            const btn = document.createElement('button');
            btn.classList.add('action-button');
            btn.textContent = label;
            btn.onclick = () => { window.location.href = href; };
            actionsBar.appendChild(btn);
        }

        function createCancelButton(onClick) {
            const btn = document.createElement('button');
            btn.classList.add('small-button-red');
            btn.textContent = 'Cancel';
            btn.onclick = onClick;
            return btn;
        }

        function createCompleteButton(onClick) {
            const btn = document.createElement('button');
            btn.classList.add('small-button');
            btn.textContent = 'Mark as Completed';
            btn.onclick = onClick;
            return btn;
        }

        /* ─── main loader ─── */
        async function loadDashboard() {
            // Remove previously-added dynamic buttons, keep the static one
            document.querySelectorAll('#actions-menu .action-button').forEach(btn => {
                if (btn.id !== 'viewRequestsBtn') btn.remove();
            });

            appointmentsList.innerHTML = '';

            // ── Slot reservations (Type 0 / Type 3) ──
            const slotsUrl = role === 'owner'
                ? `${API_BASE}/api/slots/owner/${id}/reservations`
                : `${API_BASE}/api/slots/my-reservations/${id}`;

            try {
                const response1 = await fetch(slotsUrl, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data1 = await response1.json();
                if (Array.isArray(data1)) {
                    for (const item of data1) renderCard(item);
                }
            } catch (e) {
                console.error('Failed to load slot reservations:', e);
            }

            // ── Type 1 + Type 2 appointments ──
            const apptUrl = role === 'owner'
                ? `${API_BASE}/api/bookings/appointments/owner/${id}`
                : `${API_BASE}/api/bookings/appointments/user/${id}`;

            try {
                const response2 = await fetch(apptUrl, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data2 = await response2.json();
                for (const item of (data2.type1 || [])) renderType1Card(item);
                for (const item of (data2.type2 || [])) renderType2Card(item);
            } catch (e) {
                console.error('Failed to load bookings:', e);
            }

            if (appointmentsList.children.length === 0) {
                const empty = document.createElement('p');
                empty.classList.add('empty-state');
                empty.textContent = 'No appointments yet.';
                appointmentsList.appendChild(empty);
            }

            // ── Role-specific sidebar buttons ──
            if (role === 'owner') {
                document.getElementById('viewRequestsBtn').style.display = 'none';

                renderAction('Manage Slots', 'owner-manage-slots.html');
                renderAction('Create Group Meeting', 'owner-manage-slots.html?openCreate=true');
                renderAction('Finalize Group Meeting', 'owner-manage-slots.html?openFinalize=true');
                renderAction('Browse & Request Meetings', 'browse-owners.html');

                const exportAllBtn = document.createElement('button');
                exportAllBtn.classList.add('action-button');
                exportAllBtn.textContent = 'Export All to Calendar';

                exportAllBtn.onclick = () => {
                    const url = `${API_BASE}/api/ical/owner/${id}/all`;

                    fetch(url, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    })
                    .then(r => r.blob())
                    .then(blob => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = 'all-events.ics';
                        a.click();
                        URL.revokeObjectURL(a.href);
                    })
                    .catch(e => alert('Export failed: ' + e.message));
                };

                actionsBar.appendChild(exportAllBtn);

                const pendingBtn = document.createElement('button');
                pendingBtn.classList.add('action-button');
                pendingBtn.textContent = 'View Pending Requests';
                pendingBtn.onclick = () => openPendingModal();
                actionsBar.appendChild(pendingBtn);

            } else {
                // student
                document.getElementById('viewRequestsBtn').style.display = '';
                renderAction('Book Another Appointment', 'browse-owners.html');

                // Export all reservations to .ics
                const exportAllBtn = document.createElement('button');
                exportAllBtn.classList.add('action-button');
                exportAllBtn.textContent = 'Export All to Calendar';
                exportAllBtn.onclick = () => {
                    const url = `${API_BASE}/api/slots/my-reservations/${id}/export.ics`;
                    fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(r => r.blob())
                        .then(blob => {
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            a.download = 'my-bookings.ics';
                            a.click();
                        })
                        .catch(e => alert('Export failed: ' + e.message));
                };
                actionsBar.appendChild(exportAllBtn);
            }
        }

        /* ─── Type 0/3: regular reserved slot card ─── */
        function renderCard(item) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('appointment-card');

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-slot');
            badge.textContent = (item.slot && item.slot.type === 'recurring') ? 'Recurring Slot' : 'Booking Slot';
            newDiv.appendChild(badge);

            const heading = document.createElement('h3');
            heading.textContent = item.slot ? item.slot.title : '(no title)';
            newDiv.appendChild(heading);

            const time = document.createElement('p');
            const startTime = item.slot ? new Date(item.slot.startTime).toLocaleString() : '';
            const endTime   = item.slot ? new Date(item.slot.endTime).toLocaleString()   : '';
            time.textContent = 'Time: ' + startTime + ' — ' + endTime;
            newDiv.appendChild(time);

            const status = document.createElement('p');
            status.textContent = 'Status: ' + (item.slot ? item.slot.status : '');
            newDiv.appendChild(status);

            const buttonDiv = document.createElement('div');
            buttonDiv.classList.add('card-actions');

            if (role === 'owner') {
                const bookedBy = document.createElement('p');
                bookedBy.textContent = 'Booked by: ' + (item.user ? item.user.email : 'Unknown');
                newDiv.appendChild(bookedBy);

                const isPast = item.slot && new Date(item.slot.startTime) < new Date();

                if (isPast) {
                    const completedBadge = document.createElement('p');
                    completedBadge.style.cssText = 'color:#22c55e;font-weight:700;margin-top:10px;';
                    completedBadge.textContent = '✓ Completed';
                    newDiv.appendChild(completedBadge);
                    newDiv.style.opacity = '0.65';
                } else {
                    // Message Booker
                    const messageBooker = document.createElement('button');
                    messageBooker.classList.add('small-button');
                    messageBooker.textContent = 'Message Booker';
                    messageBooker.onclick = async () => {
                        const res = await fetch(`${API_BASE}/api/slots/${item.slot._id}/message-booker`, {
                            headers: { 'Authorization': 'Bearer ' + token }
                        });
                        const data = await res.json();
                        if (res.ok) window.location.href = data.mailto;
                        else alert(data.error);
                    };
                    buttonDiv.appendChild(messageBooker);

                    // Export single slot .ics
                    const exportBtn = document.createElement('button');
                    exportBtn.classList.add('small-button');
                    exportBtn.textContent = 'Export .ics';
                    exportBtn.onclick = () => {
                        const url = `${API_BASE}/api/slots/${item.slot._id}/export.ics`;
                        fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
                            .then(r => r.blob())
                            .then(blob => {
                                const a = document.createElement('a');
                                a.href = URL.createObjectURL(blob);
                                a.download = 'appointment.ics';
                                a.click();
                            });
                    };
                    buttonDiv.appendChild(exportBtn);
                }

            } else {
                // Student: message owner
                const messageOwner = document.createElement('button');
                messageOwner.classList.add('small-button');
                messageOwner.textContent = 'Message Owner';
                messageOwner.onclick = async () => {
                    const res = await fetch(`${API_BASE}/api/slots/${item.slot._id}/message-owner`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    if (res.ok) window.location.href = data.mailto;
                    else alert(data.error);
                };
                buttonDiv.appendChild(messageOwner);

                // Cancel appointment
                const cancel = document.createElement('button');
                cancel.classList.add('small-button-red');
                cancel.textContent = 'Cancel Appointment';
                cancel.onclick = async () => {
                    if (!confirm('Cancel this appointment?')) return;
                    const res = await fetch(`${API_BASE}/api/slots/cancel`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ reservationId: item._id, userId: id })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        loadDashboard();
                        if (data.notifyOwner) window.location.href = data.notifyOwner;
                    } else {
                        alert(data.error);
                    }
                };
                buttonDiv.appendChild(cancel);

                // Export single slot .ics
                const exportBtn = document.createElement('button');
                exportBtn.classList.add('small-button');
                exportBtn.textContent = 'Export .ics';
                exportBtn.onclick = () => {
                    const url = `${API_BASE}/api/slots/${item.slot._id}/export.ics`;
                    fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
                        .then(r => r.blob())
                        .then(blob => {
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            a.download = 'appointment.ics';
                            a.click();
                            URL.revokeObjectURL(a.href);
                        });
                };
                buttonDiv.appendChild(exportBtn);
            }

            newDiv.appendChild(buttonDiv);
            appointmentsList.appendChild(newDiv);
        }

        /* ─── Type 1: meeting request card ─── */
        function renderType1Card(item) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('appointment-card');

            const isPast = item.proposedTime && new Date(item.proposedTime) < new Date();

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-req');
            badge.textContent = isPast ? 'Meeting — Completed' : 'Meeting Request';
            newDiv.appendChild(badge);

            const h = document.createElement('h3');
            h.textContent = item.title || 'Meeting Request';
            newDiv.appendChild(h);

            const other = document.createElement('p');
            other.textContent = (role === 'owner')
                ? 'From: ' + item.userEmail
                : 'With: ' + item.ownerEmail;
            newDiv.appendChild(other);

            if (item.proposedTime) {
                const t = document.createElement('p');
                t.textContent = 'Time: ' + new Date(item.proposedTime).toLocaleString();
                newDiv.appendChild(t);
            }

            const statusP = document.createElement('p');
            statusP.textContent = 'Status: ' + item.status;
            newDiv.appendChild(statusP);

            const buttonDiv = document.createElement('div');
            buttonDiv.classList.add('card-actions');

            if (!isPast && item.status === 'approved') {
                const msgTarget = role === 'owner' ? item.userEmail : item.ownerEmail;

                const msgBtn = document.createElement('button');
                msgBtn.classList.add('small-button');
                msgBtn.textContent = 'Message';
                msgBtn.onclick = () => {
                    window.location.href = `mailto:${msgTarget}?subject=${encodeURIComponent('Re: ' + (item.title || 'Meeting'))}`;
                };
                buttonDiv.appendChild(msgBtn);
            }

            // Only show Cancel and Complete buttons for future appointments
            if (!isPast) {
                const cancelBtn = document.createElement('button');
                cancelBtn.classList.add('small-button-red');
                cancelBtn.textContent = 'Cancel';
                cancelBtn.onclick = async () => {
                    const res = await fetch(`${API_BASE}/api/bookings/cancel`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ bookingId: item._id, userId: id })
                    });
                    if (res.ok) loadDashboard();
                    else alert('Cancel failed');
                };
                buttonDiv.appendChild(cancelBtn);

                const completeBtn = document.createElement('button');
                completeBtn.classList.add('small-button');
                completeBtn.textContent = 'Mark as Completed';
                completeBtn.onclick = async () => {
                    const res = await fetch(`${API_BASE}/api/bookings/complete`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ bookingId: item._id })
                    });
                    if (res.ok) loadDashboard();
                    else alert('Complete failed');
                };
                buttonDiv.appendChild(completeBtn);
            }

            newDiv.appendChild(buttonDiv);

            if (isPast) newDiv.style.opacity = '0.55';

            appointmentsList.appendChild(newDiv);
        }

        /* ─── Type 2: group meeting card ─── */
        function renderType2Card(item) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('appointment-card');

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-group');
            badge.textContent = 'Group Meeting';
            newDiv.appendChild(badge);

            const heading = document.createElement('h3');
            heading.textContent = item.title || 'Group Meeting';
            newDiv.appendChild(heading);

            const time = document.createElement('p');
            time.textContent = 'Time: ' + new Date(item.time).toLocaleString();
            newDiv.appendChild(time);

            if (item.isRecurring) {
                const week = document.createElement('p');
                week.textContent = 'Week ' + item.weekNumber + ' of recurring series';
                newDiv.appendChild(week);
            }

            const organizer = document.createElement('p');
            organizer.textContent = 'Organizer: ' + (item.ownerEmail || 'Unknown');
            newDiv.appendChild(organizer);

            const isPast = new Date(item.time) < new Date();

            const buttonDiv = document.createElement('div');
            buttonDiv.classList.add('card-actions');

            if (!isPast) {
                const msgBtn = document.createElement('button');
                msgBtn.classList.add('small-button');
                msgBtn.textContent = 'Message';
                msgBtn.onclick = () => {
                    window.location.href = `mailto:${item.ownerEmail}`;
                };
                buttonDiv.appendChild(msgBtn);
            }

            // Only show Cancel and Complete buttons for future appointments
            if (!isPast) {
                const cancelBtn = document.createElement('button');
                cancelBtn.classList.add('small-button-red');
                cancelBtn.textContent = 'Cancel';
                cancelBtn.onclick = async () => {
                    const res = await fetch(`${API_BASE}/api/bookings/group/${item._id}/leave`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ userId: id })
                    });
                    if (res.ok) loadDashboard();
                    else alert('Cancel failed');
                };
                buttonDiv.appendChild(cancelBtn);

                const completeBtn = document.createElement('button');
                completeBtn.classList.add('small-button');
                completeBtn.textContent = 'Mark as Completed';
                completeBtn.onclick = async () => {
                    const res = await fetch(`${API_BASE}/api/bookings/group/${item._id}/complete`, {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token
                        }
                    });
                    if (res.ok) loadDashboard();
                    else alert('Complete failed');
                };
                buttonDiv.appendChild(completeBtn);
            }

            const exportBtn = document.createElement('button');
            exportBtn.classList.add('small-button');
            exportBtn.textContent = 'Export .ics';
            exportBtn.onclick = () => {
                fetch(`${API_BASE}/api/ical/group/${item._id}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(r => r.blob())
                .then(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'group-meeting.ics';
                    a.click();
                    URL.revokeObjectURL(a.href);
                });
            };
            buttonDiv.appendChild(exportBtn);

            newDiv.appendChild(buttonDiv);

            if (isPast) {
                newDiv.style.opacity = '0.55';
            }

            appointmentsList.appendChild(newDiv);
        }
        /* ─── Pending Requests modal (owner) ─── */
        function openPendingModal() {
            document.getElementById('pendingModal').classList.add('active');
            loadRequests();
        }

        function closePendingModal() {
            document.getElementById('pendingModal').classList.remove('active');
        }

        async function loadRequests() {
            const list = document.getElementById('requestsList');
            list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">Loading…</p>';
            try {
                const res = await fetch(`${API_BASE}/api/bookings/requests/owner/${id}/pending`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                list.innerHTML = '';

                if (!Array.isArray(data) || data.length === 0) {
                    list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">No pending requests.</p>';
                    return;
                }

                for (const request of data) renderRequest(request);
            } catch (e) {
                list.innerHTML = '<p style="color:red;text-align:center;padding:20px">Failed to load requests.</p>';
            }
        }

        function renderRequest(request) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('request-card');

            const fromP = document.createElement('p');
            fromP.textContent = 'From: ' + request.userEmail;
            newDiv.appendChild(fromP);

            const msgP = document.createElement('p');
            msgP.textContent = request.message;
            newDiv.appendChild(msgP);

            if (request.proposedTime) {
                const timeP = document.createElement('p');
                timeP.textContent = 'Proposed time: ' + new Date(request.proposedTime).toLocaleString();
                newDiv.appendChild(timeP);
            }

            const buttonDiv = document.createElement('div');

            // FIX: declare both accept AND decline before using them
            const accept = document.createElement('button');
            accept.classList.add('accept-button');
            accept.textContent = 'Accept';

            const decline = document.createElement('button');
            decline.classList.add('decline-button');
            decline.textContent = 'Decline';

            accept.onclick = async () => {
                const res = await fetch(`${API_BASE}/api/bookings/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: request._id, accepted: true })
                });
                const data = await res.json();
                if (res.ok) {
                    await loadRequests();
                    await loadDashboard();
                    if (data.notifyUser) window.location.href = data.notifyUser;
                } else {
                    alert(data.error);
                }
            };

            decline.onclick = async () => {
                const res = await fetch(`${API_BASE}/api/bookings/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: request._id, accepted: false })
                });
                const data = await res.json();
                if (res.ok) {
                    await loadRequests();
                    if (data.notifyUser) window.location.href = data.notifyUser;
                } else {
                    alert(data.error);
                }
            };

            buttonDiv.appendChild(accept);
            buttonDiv.appendChild(decline);
            newDiv.appendChild(buttonDiv);
            document.getElementById('requestsList').appendChild(newDiv);
        }

        /* ─── My Requests modal (student) ─── */
        function openMyRequestsModal() {
            document.getElementById('myRequestsModal').classList.add('active');
            loadMyRequests();
        }

        function closeMyRequestsModal() {
            document.getElementById('myRequestsModal').classList.remove('active');
        }

        async function loadMyRequests() {
            const list = document.getElementById('myRequestsList');
            list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">Loading…</p>';
            try {
                const res = await fetch(`${API_BASE}/api/bookings/requests/user/${id}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                list.innerHTML = '';

                if (!Array.isArray(data) || data.length === 0) {
                    list.innerHTML = '<p style="color:gray;text-align:center;padding:20px">No requests yet.</p>';
                    return;
                }

                for (const req of data) renderMyRequest(req);
            } catch (e) {
                list.innerHTML = '<p style="color:red;text-align:center;padding:20px">Failed to load requests.</p>';
            }
        }

        function renderMyRequest(request) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('request-card');

            const toP = document.createElement('p');
            toP.textContent = 'To: ' + request.ownerEmail;
            newDiv.appendChild(toP);

            const msgP = document.createElement('p');
            msgP.textContent = request.message;
            newDiv.appendChild(msgP);

            if (request.proposedTime) {
                const timeP = document.createElement('p');
                timeP.textContent = 'Proposed time: ' + new Date(request.proposedTime).toLocaleString();
                newDiv.appendChild(timeP);
            }

            const statusP = document.createElement('p');
            statusP.textContent = 'Status: ' + request.status;
            newDiv.appendChild(statusP);

            document.getElementById('myRequestsList').appendChild(newDiv);
        }

        /* Call on page load */
        loadDashboard();
    </script>
</body>
</html>
