<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Dashboard</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 30px 40px;
        }

        h6 {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .dashboard-header h1 {
            font-size: 42px;
            color: rgb(237, 27, 47);
        }

        .logout-button {
            width: 130px;
            height: 50px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .logout-button:hover {
            background: rgb(237, 27, 47);
        }

        .dashboard-grid {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }

        .left-panel {
            flex: 2;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .right-panel {
            flex: 1;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .panel-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        .appointment-card {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            margin-bottom: 18px;
            background: rgb(255, 255, 255);
        }

        .appointment-card h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }

        .appointment-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 6px;
        }

        .card-actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .small-button {
            height: 42px;
            padding: 0 18px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .small-button:hover {
            background: rgb(237, 27, 47);
        }

        .action-button {
            width: 100%;
            height: 55px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-bottom: 14px;
            transition: .3s;
            font-size: 15px;
        }

        .action-button:hover {
            background: rgb(237, 27, 47);
        }

        /* Modal - Annie Huynh */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 30px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: black;
        }

        .modal-close:hover {
            color: rgb(237, 27, 47);
        }

        .request-card {
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            margin-bottom: 14px;
        }

        .request-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 8px;
        }

        .accept-button, .decline-button {
            height: 40px;
            padding: 0 16px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: .3s;
            margin-right: 8px;
            margin-top: 8px;
        }

        .accept-button { background: rgb(0, 0, 0); }
        .accept-button:hover { background: rgb(237, 27, 47); }
        .decline-button { background: rgb(150, 150, 150); }
        .decline-button:hover { background: rgb(237, 27, 47); }
    </style>
</head>

<body>
    <h6>MyBookings</h6>

    <div class="dashboard-header">
        <h1>Dashboard</h1>
        <button class="logout-button" onclick="window.location.href='landing.html'">Logout</button>
    </div>

    <div class="dashboard-grid">
        <div class="left-panel">
            <h2 class="panel-title">My Appointments</h2>

            <div id="appointmentsList">
                <div class="appointment-card">
                    <h3>Office Hours with Prof. Smith</h3>
                    <p>Date: Monday, April 15</p>
                    <p>Time: 10:00 AM - 10:30 AM</p>
                    <p>Status: Confirmed</p>

                    <div class="card-actions">
                        <button class="small-button">Message Owner</button>
                        <button class="small-button">Cancel Appointment</button>
                    </div>
                </div>

                <div class="appointment-card">
                    <h3>Group Meeting</h3>
                    <p>Date: Wednesday, April 17</p>
                    <p>Time: 2:00 PM - 3:00 PM</p>
                    <p>Status: Pending</p>

                    <div class="card-actions">
                        <button class="small-button">Message Owner</button>
                        <button class="small-button">Cancel Appointment</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel" id="actions-menu">
            <h2 class="panel-title">Actions</h2>
            <button class="action-button" onclick="window.location.href='browse-owners.html'">Browse Owners</button>
            <button class="action-button" id="viewRequestsBtn" onclick="openMyRequestsModal()">View Requests</button>
        </div>
    </div>

    <!-- Owner's pending requests modals  - Annie Huynh -->
    <div class="modal-overlay" id="pendingModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closePendingModal()">&#10005;</button>
            <h2 class="panel-title">Pending Requests</h2>
            <div id="requestsList"></div>
        </div>
    </div>

    <!-- Students' request view - Annie Huynh -->
    <div class="modal-overlay" id="myRequestsModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeMyRequestsModal()">&#10005;</button>
            <h2 class="panel-title">My Requests</h2>
            <div id="myRequestsList"></div>
        </div>
    </div>

    <!--- Annie Huynh --->
    <script>
        const API_BASE = 'http://winter2026-comp307-group38.cs.mcgill.ca:3000';
        // Read the JWT from localStorage
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        const name = localStorage.getItem('name');
        const id = localStorage.getItem('user._id');

        // redirect to login page if token is missing
        if (!token){
            window.location.href = 'login.html'
        }

      // fetch call for student and owner
        async function loadDashboard(){
            const url = role === 'owner'
            ? `${API_BASE}/api/slots/owner/${id}/reservations`
            : `${API_BASE}/api/slots/my-reservations/${id}`;

            const response1 = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } }); // header for JWT handshake
            const data1 = await response1.json();

            // render data as cards using helper
            appointmentsList.innerHTML='';
            for (const item of data1){
                renderCard(item, role);
            }

            // second call to load Type 1 and 2 appointments for the student/owner
            const apptUrl = role === 'owner'
                ? `${API_BASE}/api/bookings/appointments/owner/${id}`
                : `${API_BASE}/api/bookings/appointments/user/${id}`;
            const response2 = await fetch(apptUrl, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data2 = await response2.json();
            // data2 is { type1: [...], type2: [...] }
            for (const item of data2.type1){
                renderType1Card(item, role);
            }
            for (const item of data2.type2){
                renderType2Card(item);
            }


            // some view stuff wb
            if (role === 'owner'){
                document.getElementById('viewRequestsBtn').style.display = 'none';
                renderAction("Manage Slots", "owner-manage-slots.html");
                renderAction("Create Group Meeting", "owner-manage-slots.html?openCreate=true");
                renderAction("Finalize Group Meeting", "owner-manage-slots.html?openFinalize=true");

                const pendingBtn = document.createElement("button");
                pendingBtn.classList.add("action-button");
                pendingBtn.textContent = "View Pending Requests";
                pendingBtn.onclick = () => openPendingModal();
                actionsBar.appendChild(pendingBtn);
            }
        }
        loadDashboard();

        const appointmentsList = document.getElementById("appointmentsList");
        const actionsBar = document.getElementById("actions-menu");

        function renderAction(name, href){ //wb
            const new_button = document.createElement("button");
            new_button.setAttribute("class", "action-button");
            new_button.setAttribute("onclick", `window.location.href='${href}'`);
            new_button.innerHTML=name;

            actionsBar.appendChild(new_button);
        }

        // helper function to render item
        function renderCard(item, role){

            const newDiv = document.createElement("div");
            newDiv.classList.add("appointment-card");
            newDiv.innerHTML='';

            const buttonDiv = document.createElement("div");
            buttonDiv.classList.add("card-actions");

            // check if its a student or owner
            if (role === 'owner'){
                const heading = document.createElement("h3");
                heading.textContent=item.slot.title;
                newDiv.appendChild(heading);

                const time = document.createElement("p");
                const startTime = new Date(item.slot.startTime).toLocaleString();
                const endTime = new Date(item.slot.endTime).toLocaleString()
                time.textContent = "Time: " + startTime + " - " + endTime;
                newDiv.appendChild(time);

                const status = document.createElement("p");
                status.textContent = "Status: " + item.slot.status;
                newDiv.appendChild(status);

                const messageBooker = document.createElement("button");
                messageBooker.classList.add("small-button");
                messageBooker.textContent="Message Booker";
                buttonDiv.appendChild(messageBooker);
                messageBooker.onclick = async() => {
                const response = await fetch(`${API_BASE}/api/slots/${item.slot._id}/message-booker`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.mailto;
                } else {
                    alert(data.error);
                }
            }

            }
            else{ // is a student
                const heading = document.createElement("h3");
                heading.textContent=item.slot.title;
                newDiv.appendChild(heading);

                const time = document.createElement("p");
                const startTime = new Date(item.slot.startTime).toLocaleString();
                const endTime = new Date(item.slot.endTime).toLocaleString()
                time.textContent = "Time: " + startTime + " - " + endTime;
                newDiv.appendChild(time);

                const status = document.createElement("p");
                status.textContent = "Status: " + item.slot.status;
                newDiv.appendChild(status);

                const messageOwner = document.createElement("button");
                messageOwner.classList.add("small-button");
                messageOwner.textContent="Message Owner";
                buttonDiv.appendChild(messageOwner);
                messageOwner.onclick = async () => {
                    const response = await fetch(`${API_BASE}/api/slots/${item.slot._id}/message-owner`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await response.json();
                    if (response.ok) {
                        window.location.href = data.mailto;
                    } else {
                        alert(data.error);
                    }
                };

                const cancel = document.createElement("button");
                cancel.classList.add("small-button");
                cancel.textContent="Cancel Appointment";
                buttonDiv.appendChild(cancel);
                cancel.onclick = async() => {
                    const response = await fetch(`${API_BASE}/api/slots/cancel`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ reservationId: item._id, userId: id })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        // reload the dashboard to reflect the cancellation
                        loadDashboard();
                        if (data.notifyOwner){
                            window.location.href = data.notifyOwner; //prompt user to email owner
                        }
                    } else {
                        alert(data.error);
                    }
                }
            }
            // add divs to html
            newDiv.appendChild(buttonDiv);
            appointmentsList.appendChild(newDiv);
        }

        // Render a Type 1 approved meeting request
        function renderType1Card(item, role) {
            const newDiv = document.createElement("div");
            newDiv.classList.add("appointment-card");

            const heading = document.createElement("h3");
            heading.textContent = item.title || "Meeting Request";
            newDiv.appendChild(heading);

            const other = document.createElement("p");
            other.textContent = role === 'owner'
                ? "From: " + item.userEmail
                : "With: " + item.ownerEmail;
            newDiv.appendChild(other);

            const status = document.createElement("p");
            status.textContent = "Status: " + item.status;
            newDiv.appendChild(status);

            const type = document.createElement("p");
            type.textContent = "Type: Meeting Request";
            newDiv.appendChild(type);

            appointmentsList.appendChild(newDiv);
        }

        // Render a Type 2 finalized group meeting appointment
        function renderType2Card(item) {
            const newDiv = document.createElement("div");
            newDiv.classList.add("appointment-card");

            const heading = document.createElement("h3");
            heading.textContent = item.title || "Group Meeting";
            newDiv.appendChild(heading);

            const time = document.createElement("p");
            time.textContent = "Time: " + new Date(item.time).toLocaleString();
            newDiv.appendChild(time);

            if (item.isRecurring) {
                const week = document.createElement("p");
                week.textContent = "Week: " + item.weekNumber;
                newDiv.appendChild(week);
            }

            const type = document.createElement("p");
            type.textContent = "Type: Group Meeting";
            newDiv.appendChild(type);

            appointmentsList.appendChild(newDiv);
        }

        // Pending Requests Modal - Annie Huynh
        function openPendingModal() {
            document.getElementById('pendingModal').classList.add('active');
            loadRequests();
        }

        function closePendingModal() {
            document.getElementById('pendingModal').classList.remove('active');
        }

        // My Requests Modal (student) - Annie Huynh
        function openMyRequestsModal() {
            document.getElementById('myRequestsModal').classList.add('active');
            loadMyRequests();
        }

        function closeMyRequestsModal() {
            document.getElementById('myRequestsModal').classList.remove('active');
        }

        async function loadMyRequests() {
            const response = await fetch(`${API_BASE}/api/bookings/requests/user/${id}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            const list = document.getElementById('myRequestsList');
            list.innerHTML = '';
            for (const request of data) {
                const card = document.createElement("div");
                card.classList.add("request-card");

                const to = document.createElement("p");
                to.textContent = "To: " + request.ownerEmail;
                card.appendChild(to);

                const msg = document.createElement("p");
                msg.textContent = request.message;
                card.appendChild(msg);

                const status = document.createElement("p");
                status.textContent = "Status: " + request.status;
                card.appendChild(status);

                list.appendChild(card);
            }
        }

        async function loadRequests() {
            const response = await fetch(`${API_BASE}/api/bookings/requests/owner/${id}/pending`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            document.getElementById('requestsList').innerHTML = '';
            for (const request of data) {
                renderRequest(request);
            }
        }

        function renderRequest(request) {
            const newDiv = document.createElement("div");
            newDiv.classList.add("request-card");

            const buttonDiv = document.createElement("div");

            const userRequest = document.createElement("p");
            userRequest.textContent = request.message;
            newDiv.appendChild(userRequest);

            const userEmail = document.createElement("p");
            userEmail.textContent = request.userEmail;
            newDiv.appendChild(userEmail);

            const accept = document.createElement("button");
            accept.classList.add("accept-button");
            accept.textContent = "Accept";
            buttonDiv.appendChild(accept);
            accept.onclick = async () => {
                const response = await fetch(`${API_BASE}/api/bookings/respond`,
                    { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: request._id, accepted: true }) });
                const data = await response.json();
                if (response.ok) {
                    window.open(data.notifyUser);
                    loadRequests();
                } else {
                    alert(data.error);
                }
            };

            const decline = document.createElement("button");
            decline.classList.add("decline-button");
            decline.textContent = "Decline";
            buttonDiv.appendChild(decline);
            decline.onclick = async () => {
                const response = await fetch(`${API_BASE}/api/bookings/respond`,
                    { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ bookingId: request._id, accepted: false }) });
                const data = await response.json();
                if (response.ok) {
                    window.open(data.notifyUser);
                    loadRequests();
                } else {
                    alert(data.error);
                }
            };

            newDiv.appendChild(buttonDiv);
            document.getElementById('requestsList').appendChild(newDiv);
        }
    </script>
</body>
</html>
