<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Dashboard</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 30px 40px;
        }

        h6 {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .dashboard-header h1 {
            font-size: 42px;
            color: rgb(237, 27, 47);
        }

        .logout-button {
            width: 130px;
            height: 50px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .logout-button:hover {
            background: rgb(237, 27, 47);
        }

        .dashboard-grid {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }

        .left-panel {
            flex: 2;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .right-panel {
            flex: 1;
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .panel-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        .appointment-card {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            margin-bottom: 18px;
            background: rgb(255, 255, 255);
        }

        .appointment-card h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }

        .appointment-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 6px;
        }

        .card-actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .small-button {
            height: 42px;
            padding: 0 18px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .small-button:hover {
            background: rgb(237, 27, 47);
        }

        .action-button {
            width: 100%;
            height: 55px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-bottom: 14px;
            transition: .3s;
            font-size: 15px;
        }

        .action-button:hover {
            background: rgb(237, 27, 47);
        }
    </style>
</head>

<body>
    <h6>NAME OF APPLICATION</h6>

    <div class="dashboard-header">
        <h1>Dashboard</h1>
        <button class="logout-button" onclick="window.location.href='landing.html'">Logout</button>
    </div>

    <div class="dashboard-grid">
        <div class="left-panel">
            <h2 class="panel-title">My Appointments</h2>

            <div id="appointmentsList">
                <div class="appointment-card">
                    <h3>Office Hours with Prof. Smith</h3>
                    <p>Date: Monday, April 15</p>
                    <p>Time: 10:00 AM - 10:30 AM</p>
                    <p>Status: Confirmed</p>

                    <div class="card-actions">
                        <button class="small-button">Message Owner</button>
                        <button class="small-button">Cancel Appointment</button>
                    </div>
                </div>

                <div class="appointment-card">
                    <h3>Group Meeting</h3>
                    <p>Date: Wednesday, April 17</p>
                    <p>Time: 2:00 PM - 3:00 PM</p>
                    <p>Status: Pending</p>

                    <div class="card-actions">
                        <button class="small-button">Message Owner</button>
                        <button class="small-button">Cancel Appointment</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <h2 class="panel-title">Actions</h2>

            <button class="action-button" onclick="window.location.href='browse-owners.html'">Browse Owners</button>
            <button class="action-button">Book Another Appointment</button>
            <button class="action-button">View Requests</button>
        </div>
    </div>
</body>
</html>
