<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Browse Owners</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 30px 40px;
        }

        h6 {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 42px;
            color: rgb(237, 27, 47);
        }

        .back-button {
            width: 130px;
            height: 50px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .back-button:hover {
            background: rgb(237, 27, 47);
        }

        .owners-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .owner-card {
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 28px;
        }

        .owner-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: black;
        }

        .owner-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 8px;
            font-size: 16px;
        }

        .view-button {
            margin-top: 15px;
            margin-right: 10px;
            width: 170px;
            height: 48px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .view-button:hover {
            background: rgb(237, 27, 47);
        }

        /* Modal - Annie Huynh */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 30px;
            padding: 35px;
            max-width: 560px;
            width: 90%;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: black;
        }

        .modal-close:hover {
            color: rgb(237, 27, 47);
        }

        .modal-box h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .modal-box textarea {
            width: 100%;
            height: 140px;
            padding: 16px 20px;
            border-radius: 20px;
            border: none;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            font-family: "Outfit", sans-serif;
            font-size: 15px;
            resize: none;
            outline: none;
            margin-bottom: 18px;
        }

        .modal-submit {
            width: 100%;
            height: 55px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: .3s;
        }

        .modal-submit:hover {
            background: rgb(237, 27, 47);
        }

        .section-title {
            font-size: 18px;
            color: rgb(237, 27, 47);
            margin: 22px 0 14px 0;
        }

    </style>
</head>

<body>
    <h6><a href="landing.html" style="text-decoration: none;">MyBookings</a></h6>

    <div class="page-header">
        <h1>Browse Owners</h1>
        <button class="back-button" onclick="window.location.href='dashboard.html'">Back</button>
    </div>

    <div class="owners-grid" id="ownersList">
        <p style="color:gray">Loading owners...</p>
    </div>

    <!-- Requesting meeting - Annie Huynh -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeRequestModal()">&#10005;</button>
            <h2>Request Meeting</h2>
            <div class="form-group">
                <label for="meetingTitle">Meeting Title</label>
                <input type="text" id="meetingTitle" placeholder="Meeting title" />
            </div>

            <h3 class="section-title">Date</h3>

            <div class="form-group">
                <label for="requestedDate">Date</label>
                <input type="date" id="requestedDate" />
            </div>

            <h3 class="section-title">Time</h3>

            <div class="form-group">
                <label for="requestedTime">Time</label>
                <input type="time" id="requestedTime" />
            </div>

            <textarea id="requestMessage" placeholder="Reason for meeting.."></textarea>
            <button class="modal-submit" id="requestSubmitBtn">Send Request</button>
        </div>
    </div>

    <!--- Annie Huynh --->
    <script>
       const API_BASE = '';
        
        // read token and redirect if its missing
        const token = localStorage.getItem('token');
         if (!token){
            window.location.href = 'login.html'
        }

        const id = localStorage.getItem('user._id');
        const userEmail = localStorage.getItem('email');


        const ownersList = document.getElementById('ownersList');
        //fetch active owners on load
        async function loadOwners(){
            const url = `${API_BASE}/api/slots/owners/active`;

            const response = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } }); // header for JWT handshake
            const data = await response.json();

            console.log(data); // wb testing

            //clear hardcoded cards
            ownersList.innerHTML='';

            // render each owner card
            for (const owner of data){
                await renderOwnerCard(owner);
            }
        }
        loadOwners();


        let currentOwnerId = null;
        let currentOwnerEmail = null;
        // helper function to render cards
        async function renderOwnerCard(owner){
            const newDiv = document.createElement("div");
            newDiv.classList.add("owner-card");
            newDiv.innerHTML='';

            const buttonDiv = document.createElement("div");
            buttonDiv.classList.add("card-actions");

            const heading = document.createElement("h3");
            heading.textContent=owner.name;
            newDiv.appendChild(heading);

            const email = document.createElement("p");
            email.textContent = "Email: " + owner.email;
            newDiv.appendChild(email);

            const viewSlots = document.createElement("button");
            viewSlots.classList.add("view-button");
            viewSlots.textContent="View Slots";
            buttonDiv.appendChild(viewSlots);
            viewSlots.onclick = () => {
                window.location.href = `owner-slots.html?ownerId=${owner._id}&ownerName=${encodeURIComponent(owner.name)}`;
            };

            const requestMeeting = document.createElement("button");
            requestMeeting.classList.add("view-button");
            requestMeeting.textContent="Request Meeting";
            buttonDiv.appendChild(requestMeeting);
            requestMeeting.onclick = () => {
                currentOwnerId = owner._id;
                currentOwnerEmail = owner.email;
                openRequestModal();
            };

            const activeSlots = document.createElement("p");
            activeSlots.textContent = "Active Slots: ...";
            newDiv.appendChild(activeSlots);

            // append to html
            newDiv.appendChild(buttonDiv);
            ownersList.appendChild(newDiv);

            // fetch active slot count for this owner
            const slotsRes = await fetch(`${API_BASE}/api/slots/owner/${owner._id}/active`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const slotsData = await slotsRes.json();
            activeSlots.textContent = "Active Slots: " + (Array.isArray(slotsData) ? slotsData.length : 0);
        }

        // Request Meeting 
        function openRequestModal() {
            document.getElementById('requestMessage').value = '';
            document.getElementById('requestModal').classList.add('active');
        }

        function closeRequestModal() {
            document.getElementById('requestModal').classList.remove('active');
        }

        document.getElementById('requestSubmitBtn').onclick = async () => {
            const title = document.getElementById('meetingTitle').value;
            const date = document.getElementById('requestedDate').value;
            const time = document.getElementById('requestedTime').value;
            const message = document.getElementById('requestMessage').value.trim();
            if (!title || !message || !date || !time) return alert('Please fill all fields');

           const response = await fetch(`${API_BASE}/api/bookings/request`,
                { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({
                    ownerId: currentOwnerId,
                    message,
                    ownerEmail: currentOwnerEmail,
                    title,
                    proposedTime: new Date(date + 'T' + time).toISOString()
                })
                });

            const data = await response.json();
            if (response.ok) {
                closeRequestModal();
                window.open(data.notifyOwner);
                window.location.href = 'dashboard.html';
            } else {
                alert(data.error);
            }
        };
    </script>
</body>
</html>
