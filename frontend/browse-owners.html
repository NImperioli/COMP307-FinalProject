<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="description" content="MyBookings: Booking Application for McGill students and employees.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Browse Owners</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        .top-bar {
            width: calc(100% - 40px);
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            padding: 16px 28px;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.16);
            z-index: 5;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-decoration: none;
            color: black;
            letter-spacing: 1px;
        }

        .logo span { color: rgb(237, 27, 47); }

        .top-buttons { display: flex; gap: 12px; }

        .top-button {
            min-width: 100px;
            height: 44px;
            background: black;
            border: none;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .top-button:hover { background: rgb(237, 27, 47); }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 200px 40px 30px 40px;
        }

        .page-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 42px;
            color: black;
            position: relative;
        }

        .page-header h1::after {
            content: "";
            display: block;
            width: 290px;
            height: 3px;
            background: rgb(237, 27, 47);
            margin: 1px auto 0;
            border-radius: 2px;
        }

        .owners-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
            position: relative;
            z-index: 2;
        }

        .owner-card {
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 28px;
        }

        .owner-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: black;
        }

        .owner-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 8px;
            font-size: 16px;
        }

        .card-actions { margin-top: 15px; }

        .view-button {
            margin-right: 10px;
            margin-top: 8px;
            width: 170px;
            height: 48px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
            position: relative;
            overflow: hidden;
        }

        .view-button:hover { background: rgb(237, 27, 47); }

        .view-button::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .view-button:hover::after { left: 100%; }

        .wave-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 480px;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
            animation: waveMove 12s linear infinite;
        }

        .wave-svg { width: 100%; height: 100%; display: block; }

        .wave-back {
            bottom: -40px;
            height: 620px;
            opacity: 0.45;
            animation-duration: 18s;
        }

        .wave-back .wave-svg {
            transform: scaleY(1.2);
            transform-origin: bottom;
        }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        .main-panel,
        .page-header,
        .owners-grid,
        .owner-card {
            position: relative;
            z-index: 2;
        }

        /* Modal - Annie Huynh */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 30px;
            padding: 35px;
            max-width: 560px;
            width: 90%;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: black;
        }

        .modal-close:hover { color: rgb(237, 27, 47); }

        .modal-box h2 { font-size: 28px; margin-bottom: 20px; }

        .modal-box textarea {
            width: 100%;
            height: 140px;
            padding: 16px 20px;
            border-radius: 20px;
            border: none;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            font-family: "Outfit", sans-serif;
            font-size: 15px;
            resize: none;
            outline: none;
            margin-bottom: 18px;
        }

        .input-field {
            width: 100%;
            height: 54px;
            font-size: 15px;
            padding: 0 20px;
            border-radius: 30px;
            border: none;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            outline: none;
            margin-bottom: 14px;
            font-family: "Outfit", sans-serif;
        }

        .modal-submit {
            width: 100%;
            height: 55px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: .3s;
        }

        .modal-submit:hover { background: rgb(237, 27, 47); }

        .section-title {
            font-size: 18px;
            color: rgb(237, 27, 47);
            margin: 16px 0 10px 0;
        }
    </style>
</head>

<body>
    <div class="wave-bg wave-back">
        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.3"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="wave-bg">
        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.8"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="top-bar">
        <a href="landing.html" class="logo">My<span>Bookings</span></a>
        <div class="top-buttons">
            <button class="top-button" onclick="window.location.href='dashboard.html'">Back</button>
        </div>
    </div>

    <div class="page-header">
        <h1>Browse Owners</h1>
    </div>

    <div class="owners-grid" id="ownersList">
        <p style="color:gray">Loading owners...</p>
    </div>

    <!-- Request Meeting modal - Annie Huynh -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeRequestModal()">&#10005;</button>
            <h2>Request Meeting</h2>

            <label style="font-size:15px;font-weight:600;display:block;margin-bottom:6px;">Meeting Title</label>
            <input class="input-field" type="text" id="meetingTitle" placeholder="Meeting title" />

            <h3 class="section-title">Date</h3>
            <input class="input-field" type="date" id="requestedDate" />

            <h3 class="section-title">Time</h3>
            <input class="input-field" type="time" id="requestedTime" />

            <textarea id="requestMessage" placeholder="Reason for meeting.."></textarea>
            <button class="modal-submit" id="requestSubmitBtn">Send Request</button>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        let currentOwnerId   = null;
        let currentOwnerEmail = null;

        async function loadOwners() {
            const response = await fetch(`${API_BASE}/api/slots/owners/active`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();

            const ownersList = document.getElementById('ownersList');
            ownersList.innerHTML = '';

            if (!Array.isArray(data) || data.length === 0) {
                ownersList.innerHTML = '<p style="color:gray">No active owners found.</p>';
                return;
            }

            for (const owner of data) {
                await renderOwnerCard(owner);
            }
        }

        async function renderOwnerCard(owner) {
            const ownersList = document.getElementById('ownersList');

            const newDiv = document.createElement("div");
            newDiv.classList.add("owner-card");

            const heading = document.createElement("h3");
            heading.textContent = owner.name;
            newDiv.appendChild(heading);

            const email = document.createElement("p");
            email.textContent = "Email: " + owner.email;
            newDiv.appendChild(email);

            const activeSlots = document.createElement("p");
            activeSlots.textContent = "Active Slots: ...";
            newDiv.appendChild(activeSlots);

            const buttonDiv = document.createElement("div");
            buttonDiv.classList.add("card-actions");

            const viewSlots = document.createElement("button");
            viewSlots.classList.add("view-button");
            viewSlots.textContent = "View Slots";
            viewSlots.onclick = () => {
                window.location.href = `owner-slots.html?ownerId=${owner._id}&ownerName=${encodeURIComponent(owner.name)}`;
            };
            buttonDiv.appendChild(viewSlots);

            const requestMeeting = document.createElement("button");
            requestMeeting.classList.add("view-button");
            requestMeeting.textContent = "Request Meeting";
            requestMeeting.onclick = () => {
                currentOwnerId    = owner._id;
                currentOwnerEmail = owner.email;
                openRequestModal();
            };
            buttonDiv.appendChild(requestMeeting);

            newDiv.appendChild(buttonDiv);
            ownersList.appendChild(newDiv);

            // Fetch active slot count async
            try {
                const slotsRes = await fetch(`${API_BASE}/api/slots/owner/${owner._id}/active`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const slotsData = await slotsRes.json();
                activeSlots.textContent = "Active Slots: " + (Array.isArray(slotsData) ? slotsData.length : 0);
            } catch (e) {
                activeSlots.textContent = "Active Slots: —";
            }
        }

        function openRequestModal() {
            document.getElementById('meetingTitle').value  = '';
            document.getElementById('requestedDate').value = '';
            document.getElementById('requestedTime').value = '';
            document.getElementById('requestMessage').value = '';
            document.getElementById('requestModal').classList.add('active');
        }

        function closeRequestModal() {
            document.getElementById('requestModal').classList.remove('active');
        }

        document.getElementById('requestSubmitBtn').onclick = async () => {
            const title   = document.getElementById('meetingTitle').value.trim();
            const date    = document.getElementById('requestedDate').value;
            const time    = document.getElementById('requestedTime').value;
            const message = document.getElementById('requestMessage').value.trim();

            if (!title || !message || !date || !time) {
                alert('Please fill all fields');
                return;
            }

            const response = await fetch(`${API_BASE}/api/bookings/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({
                    ownerId:      currentOwnerId,
                    message,
                    ownerEmail:   currentOwnerEmail,
                    title,
                    proposedTime: new Date(date + 'T' + time).toISOString()
                })
            });

            const data = await response.json();
            if (response.ok) {
                closeRequestModal();
                if (data.notifyOwner) window.location.href = data.notifyOwner;
                else window.location.href = 'dashboard.html';
            } else {
                alert(data.error);
            }
        };

        loadOwners();
    </script>
</body>
</html>
