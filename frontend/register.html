<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Register</title>

    <!-- CSS  -->

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 80px;
            gap: 60px;
        }

        .page-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 0 40px;
        }

        .left-section {
            flex: 1;
            max-width: 45%;
        }

        .left-section h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: black;
        }

        .left-section p {
            font-size: 18px;
            line-height: 1.6;
            color: rgb(60, 60, 60);
            max-width: 500px;
        }

        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .login-box{
            width: 440px;
            padding: 35px 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0px 5px 15px 1px rgb(180, 180, 180);
        }

        .login-header{
            text-align: center;
            margin: 20px 0 40px 0;
        }

        .login-header header {
            color: rgb(0, 0, 0);
            font-size: 30px;
            font-weight: 600;
        }

        .info-box .input-field {
            width: 100%;
            height: 60px;
            font-size: 17px;
            padding: 0 25px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: none;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            outline: none;
            transition: .3s;
            background: rgb(255, 255, 255);
        }

        ::placeholder{
            font-weight: 500;
            color: rgb(0, 0, 0);
        }

        .input-field:focus{
            width: 105%;
        }

        .input-submit {
            position: relative;
            margin-top: 10px;
        }

        .submit-button {
            width: 100%;
            height: 60px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: .3s;
        }

        .input-submit label {
            position: absolute;
            top: 45%;
            left: 50%;
            color: white;
            transform: translate(-50%, -50%);
            cursor: pointer;
        }

        .submit-button:hover {
            background: rgb(237, 27, 47);
            transform: scale(1.05,1);
        }

        h6 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }

        .left-section h1.mcgill {
            color: rgb(237, 27, 47);
        }

        .small-text {
            font-size: 14px;
            color: rgb(80, 80, 80);
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>

    <!-- HTML  -->


<body>
    <h6>NAME OF APPLICATION</h6>

    <div class="page-container">
        <div class="left-section">
            <h1 class="mcgill">Create Account</h1>
            <p>
                Register using your McGill email to access booking features.
                Professors and TAs can create and manage slots, while students can
                browse and reserve active appointments.
            </p>
        </div>

        <div class="right-section">
            <div class="login-box">
                <div class="login-header">
                    <header><b>Register</b></header>
                </div>

                <form id="registerForm">
                    <div class="info-box">
                        <input type="text" class="input-field" placeholder="Full Name" name="name" required>
                    </div>

                    <div class="info-box">
                        <input type="email" class="input-field" placeholder="McGill Email" name="email" required>
                    </div>

                    <div class="info-box">
                        <input type="password" class="input-field" placeholder="Password" name="password" required>
                    </div>

                    <div class="info-box">
                        <input type="password" class="input-field" placeholder="Confirm Password" name="confirmPassword" required>
                    </div>

                    <div class="input-submit">
                        <button class="submit-button" id="submit" type="submit"></button>
                        <label for="submit">Register</label>
                    </div>
                </form>

                
            </div>
        </div>
    </div>
</body>
</html>
