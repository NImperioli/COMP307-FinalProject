<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="description" content="MyBookings: Booking Application for McGill students and employees.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 80px;
            gap: 60px;
            background:
                linear-gradient(to left, rgba(255,255,255,0) 10%, rgba(255,255,255,1) 60%),
                url('Images/landing_bg.jpg');
            background-size: cover;
            background-position: center;
        }

        .top-bar {
            width: calc(100% - 40px);
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            padding: 16px 28px;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.16);
            z-index: 5;
        }

        .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 28px;
    font-weight: 800;
    color: rgb(237, 27, 47);
    text-decoration: none;
}

.logo-icon {
    width: 46px;   
    height: auto;
}

        .top-buttons {
            display: flex;
            gap: 12px;
        }

        .top-button {
            min-width: 100px;
            height: 44px;
            background: black;
            border: none;
            border-radius: 999px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .top-button:hover {
            background: rgb(237, 27, 47);
        }

        .page-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 0 40px;
        }

        .left-section {
            flex: 1;
            max-width: 45%;
        }

        .left-section h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: black;
        }

        .left-section p {
            font-size: 18px;
            line-height: 1.6;
            color: rgb(60, 60, 60);
            max-width: 500px;
        }

        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .login-box {
            width: 440px;
            padding: 35px 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0px 5px 15px 1px rgb(180, 180, 180);
        }

        .login-header {
            text-align: center;
            margin: 20px 0 40px 0;
        }

        .login-header header {
            position: relative;
            font-size: 30px;
            font-weight: 600;
            color: black;
            display: inline-block;
        }

        .login-header header::after {
            content: "";
            display: block;
            width: 110px;
            height: 4px;
            background: rgb(237, 27, 47);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        .info-box .input-field {
            width: 100%;
            height: 60px;
            font-size: 17px;
            padding: 0 25px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: none;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            outline: none;
            transition: .3s;
            background: rgb(255, 255, 255);
        }

        ::placeholder {
            font-weight: 500;
            color: rgb(0, 0, 0);
        }

        .input-field:focus {
            width: 105%;
        }

        .input-submit {
            position: relative;
            margin-top: 10px;
        }

        .submit-button {
            width: 100%;
            height: 60px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: .3s;
            color: white;
            font-size: 17px;
            font-family: "Outfit", sans-serif;
        }

        .submit-button:hover {
            background: rgb(237, 27, 47);
            transform: scale(1.05, 1);
        }

        .sign-up-link {
            text-align: center;
            font-size: 15px;
            margin-top: 20px;
        }

        .sign-up-link a {
            color: black;
            font-weight: 600;
        }

        .sign-up-link a:hover {
            color: red;
        }
    </style>
</head>

<body>
    <div class="top-bar">
    <a href="landing.html" class="logo">
        <span>MyBookings</span>
        <img src="Images/bird.png" class="logo-icon">
    </a>

    <div class="top-buttons">
        <button class="top-button" onclick="goBack()">Back</button>
    </div>
</div>

    <div class="page-container">
        <div class="left-section">
            <h1>Create Account</h1>
            <p>
                Register using your McGill email to access booking features.
                Professors and TAs can create and manage slots, while students can
                browse and reserve active appointments.
            </p>
        </div>

        <div class="right-section">
            <div class="login-box">
                <div class="login-header">
                    <header><b>Register</b></header>
                </div>
                <form id="registerForm">
                    <div class="info-box">
                        <input type="text" id="name" class="input-field" placeholder="Full Name" name="name" required>
                    </div>
                    <div class="info-box">
                        <input type="email" id="email" class="input-field" placeholder="McGill Email" name="email" required>
                    </div>
                    <div class="info-box">
                        <input type="password" id="pass" class="input-field" placeholder="Password" name="password" required>
                    </div>
                    <div class="info-box">
                        <input type="password" id="confirm-pass" class="input-field" placeholder="Confirm Password" name="confirmPassword" required>
                    </div>
                    <div class="input-submit">
                        <button class="submit-button" type="submit">Register</button>
                    </div>
                    <div class="sign-up-link">
                        <p>Already have an account? <a href="login.html">Log In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        document.querySelector('#registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("pass").value;
            const confirmedPassword = document.getElementById("confirm-pass").value;

            if (!email.endsWith("@mcgill.ca") && !email.endsWith("@mail.mcgill.ca")) {
                alert("Email domain must be @mcgill.ca or @mail.mcgill.ca.");
                return;
            }

            if (password !== confirmedPassword) {
                alert("Passwords must match.");
                return;
            }

            let response, data;
            try {
                response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                data = await response.json();
            } catch (err) {
                alert('Could not reach the server. Make sure the backend is running.');
                return;
            }

            if (response.ok) {
                window.location.href = 'login.html';
            } else {
                alert(data.error);
            }
        });

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
