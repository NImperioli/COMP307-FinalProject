<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Available Slots</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 30px 40px;
        }

        h6 {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .page-header h1 {
            font-size: 42px;
            color: rgb(237, 27, 47);
        }

        .back-button {
            width: 130px;
            height: 50px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .back-button:hover {
            background: rgb(237, 27, 47);
        }

        .main-panel {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .panel-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        .create-button {
            width: 180px;
            height: 50px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
            margin-bottom: 25px;
        }

        .create-button:hover {
            background: rgb(237, 27, 47);
        }

        #slot_container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        #slot_container > div {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            background: white;
            color: rgb(40, 40, 40);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        #slot_container button {
            height: 38px;
            min-width: 42px;
            padding: 0 14px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
            margin-left: 8px;
        }

        #slot_container button:hover {
            background: rgb(237, 27, 47);
        }
    </style>
</head>

<body>
    <h6>MyBookings</h6>

    <div class="page-header">
        <h1>Manage Slots</h1>
        <button class="back-button" onclick="window.location.href='dashboard.html'">Back</button>
    </div>

    <div class="main-panel">
        <h2 class="panel-title">Available Slots</h2>

        <button class="create-button" onclick="createSlot('Evil office hours', Date.parse('2026-06-06'), Date.parse('2026-06-07'))">Create Slot</button>

        <div id="slot_container"></div>
    </div>
</body>

<script>
    const API_BASE = window.location.origin;
    // wb 261143451
    //Owner-only page.
    // List automatically, Create, Delete, edit
    // from AH: Read the JWT from localStorage

    
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const id = localStorage.getItem('user._id');

    // redirect to login page if token is missing
    if (!token){
        window.location.href = 'login.html'
    }
    else if (role !== "owner"){
        window.location.href = 'dashboard.html'
        // could put a 403 page instead? idk
    }
        

    const url = `${API_BASE}/api/slots/`
    const slot_container = document.getElementById("slot_container")

    async function renderAll(options={show_repeating:true, range:[Date.now(), Date.parse("2099-12-31")], sort:"start-time", filter:["active", "private"]}){
        slot_container.innerHTML = "";

        // sort options: start-time, creation-time
        const response = await fetch(url + `owner/${id}`, {
            method: 'GET',
            headers: { "Authorization": 'Bearer ' + token },
            cache: 'no-store'
        });

        const data = await response.json();
        console.log(data);

        const filtered = [];
        for (let slot of data){
            console.log(slot.title);
            if(!options.show_repeating && (slot.type === "recurring")){
                continue;
            }

            if(Date.parse(slot.endTime) < options.range[0] || Date.parse(slot.startTime) > options.range[1]){
                continue;
            }
            if(!slot.status in options.filter){
                continue;
            }
            filtered.push(slot);
            // not sorting rn
        }
        for (let slot of filtered){
            renderSlot(slot);
        }

    }

    function renderSlot(slot_data){
        let new_slot = document.createElement("div");
        const string = slot_data.title + "; " + slot_data.status;
        new_slot.innerText=`${string}`;
        let del = document.createElement("button");
        del.innerText="x";
        del.onclick = () => {deleteSlot(slot_data._id)};
        new_slot.appendChild(del);
        let act = document.createElement("button");
        act.innerText="a";
        act.onclick = () => {activate(slot_data._id)};
        new_slot.appendChild(act);
        let dea = document.createElement("button");
        dea.innerText="d";
        dea.onclick = () => {deactivate(slot_data._id)};
        new_slot.appendChild(dea);
        // actual design should be added here
        slot_container.appendChild(new_slot);
    }

    async function createSlot(title, start, end){
        // might need to be reworked to make it a better endpoint for a form
        let slot = await fetch(url + "create", {
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'

            },
            method: 'POST',
            body: JSON.stringify({ownerId: id, title: title, start: start, end: end})
        })
        let response = await slot.json();

        console.log("Slot created: ", response);

        renderSlot(response);
    }

    // Not sure if slot editing is a good idea... Should slots have to be re-activated?
    // Might be bad design as it could cause more confusion for students when they're booked for a slot
    // they can't make.
    //function editSlot(id, title, start, end){
    //}

    async function deleteSlot(slotId, options={warn:true}){
        // I actully dk what the issue is here
        let c = true;
        if (options.warn){c = confirm("Confirm Delete?")}
        if(c){
            let slot = await fetch(url + slotId, {
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json',
                    'Access-Control-Request-Method': 'DELETE'
                },
                method: 'DELETE',
                body: JSON.stringify({ownerId: id})
            })
            console.log(slot);
            await renderAll();
        }
    }
    async function activate(slotId){
        let slot = await fetch(url + slotId + "/activate", {
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'

            },
            method: 'POST',
            body: JSON.stringify({ownerId: id})
        })
        let response = await slot.json();

        console.log("Activate response: ", response);
        await renderAll();
    }

    async function deactivate(slotId){
        let slot = await fetch(url + slotId + "/deactivate", {
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'

            },
            method: 'POST',
            body: JSON.stringify({ownerId: id})
        })
        let response = await slot.json();

        console.log("Deac response: ", response);
        await renderAll();
    }

    renderAll();

</script>

</html>
