<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Landing Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

body {
    min-height: 100vh;
    background: url('Images/landing_bg.jpg') center/cover no-repeat;

    padding: 28px 14px 24px 14px;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    position: relative;
    overflow: hidden;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;

    background: linear-gradient(
        to left,
        transparent 40%,
        rgba(248, 68, 68, 0.75) 100%
    );

    opacity: 0.7;
    animation: breatheRed 3s ease-in-out infinite;
    z-index: 0;
}

body > * {
    position: relative;
    z-index: 1;
}

@keyframes breatheRed {
    0% {
        opacity: 0.45;
    }

    50% {
        opacity: 0.85;
    }

    100% {
        opacity: 0.45;
    }
}


        

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(255, 255, 255);
            padding: 20px 40px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: rgb(237, 27, 47);
        }

        .top-buttons {
            display: flex;
            gap: 12px;
        }

        .top-button {
            width: 88px;
            height: 44px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: .3s;
        }

        .top-button:hover {
            background: rgb(237, 27, 47);
            
        }

        .hero-section {
            width: 100%;
            max-width: 450px; /* Makes the box more square-like */
            height: 450px; /* Adjust height for a square shape */
            text-align: center;
            background: rgb(255, 255, 255);
            border-radius: 24px;
            padding: 40px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute; /* Position the box absolutely */
            left: 0; /* Align the box to the left */
            margin-left: 125px; /* Optional: adds space from the left edge */
            z-index: 1; /* Ensure the hero section appears above the background */
        }

        .hero-section h1 {
            font-size: 36px;
            color: rgb(0, 0, 0);
            margin-bottom: 24px;
        }

        .hero-section p {
            font-size: 16px;
            color: rgb(50, 50, 50);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .hero-button {
            min-width: 130px;
            height: 46px;
            padding: 0 22px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: .3s;
        }

        .hero-button:hover {
            background: rgb(237, 27, 47);
        }

        .bottom-cards {
            width: 100%;
            display: flex;
            gap: 18px;
        }

        .card {
            flex: 1;
            background: rgb(255, 255, 255);
            border-radius: 24px;
            box-shadow: 0px 5px 14px 1px rgb(220, 220, 220);
            padding: 24px 24px 22px 24px;
        }

        .card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: rgb(0, 0, 0);
        }

        .card p {
            font-size: 15px;
            color: rgb(50, 50, 50);
            line-height: 1.5;
        }


    </style>
</head>

<body>
    <div class="top-bar">
        <div class="logo">MyBookings</div>

        <div class="top-buttons" id="top-buttons">
            <button class="top-button" id="login-btn" onclick="window.location.href='login.html'">Login</button>
        </div>
    </div>

    <div class="hero-section">
        <h1>McGill Booking Application</h1>
        <p>
            Book office hours, request meetings, and manage recurring appointments in one simple place.
        </p>

        <div class="hero-buttons" id="hero-buttons">
            <button class="hero-button" id="register-btn" onclick="window.location.href='register.html'">Get Started</button>
            <button class="hero-button" id="dashboard-btn" onclick="window.location.href='dashboard.html'" style="display:none">Dashboard</button>            
        </div>
    </div>

    <!--- Annie Huynh 261182881--->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            showCorrectButtons();
        });

        const API_BASE = '';
        // Read the JWT from localStorage
        const token = localStorage.getItem('token');
        const name = localStorage.getItem('name');

        function showCorrectButtons(){
            if (localStorage.getItem('token')){ //logged in
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('register-btn').style.display = 'none';
                document.getElementById('dashboard-btn').style.display = '';
                const topCorner = document.getElementById('top-buttons');
                const userName = document.createTextNode(name);
                topCorner.appendChild(userName);
            }
            else{ //not logged in
                document.getElementById('login-btn').style.display = '';
                document.getElementById('register-btn').style.display = '';
                document.getElementById('dashboard-btn').style.display = 'none';
            }
        }
    </script>
</body>
</html>
