<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Login</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 80px;
            gap: 60px;
        }

        .page-container {
            width: 100%;
            max-width: 1100px;         
            display: flex;
            justify-content: center;   
            align-items: center;
            gap: 50px;                 
            padding: 0 40px;
        }

        .left-section {
            flex: 1;
            max-width: 45%;
        }

        .left-section h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: black;
        }

        .left-section p {
            font-size: 18px;
            line-height: 1.6;
            color: rgb(60, 60, 60);
            max-width: 500px;
        }

        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .login-box{
            width: 440px;
        }

        .login-header{
            text-align: center;
            margin: 20px 0 40px 0;
        }

        .login-header header {
            color: rgb(0, 0, 0);
            font-size: 30px;
            font-weight: 600;
        }

        .info-box .input-field {
            width: 100%;
            height: 60px;
            font-size: 17px;
            padding: 0 25px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: none;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            outline: none;
            transition: .3s;
            background: rgb(255, 255, 255);
        }

        ::placeholder{
            font-weight: 500;
            color: rgb(0, 0, 0);
        }

        .input-field:focus{
            width: 105%;
        }

        .input-submit {
            position: relative;
        }

        .submit-button {
            width: 100%;
            height: 60px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: .3s;
        }

        .input-submit label {
            position: absolute;
            top: 45%;
            left: 50%;
            color: white;
            transform: translate(-50%, -50%);
            cursor: pointer;
        }

        .submit-button:hover {
            background: rgb(237, 27, 47);
            transform: scale(1.05,1);
        }

        h6 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }

        .left-section h1.mcgill {
            color: rgb(237, 27, 47);
           
        }


    </style>
</head>

<body>
    <h6>NAME OF APPLICATION</h6>
<div class="page-container">
    <div class="left-section">
        <h1 class="mcgill">Booking Application</h1>
        <p>
           Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
           Integer in lorem viverra, pellentesque eros in, fermentum 
           urna. Nulla eget lectus non mauris pretium pellentesque id 
           nec arcu. Aliquam erat volutpat. 
         
        </p>
    </div>

    <div class="right-section">
        <div class="login-box">
            <div class="login-header">
                <header><b>Login</b></header>
            </div>

            <div class="info-box">
                <input type="text" class="input-field" placeholder="Email" autocomplete="off" required>
            </div>

            <div class="info-box">
                <input type="password" class="input-field" placeholder="Password" autocomplete="off" required>
            </div>

            <div class="input-submit">
                <button class="submit-button" id="submit"></button>
                <label for="submit">Sign In</label>
            </div>
        </div>
    </div>
    </div>
</body>
</html>
