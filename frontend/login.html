<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Login</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: rgb(211, 210, 210);
           
        }
        
        .login-box{
            display: flex;
            justify-content: center;
            flex-direction: column;
            width: 440px;
            height: 480px;
            padding: 30px;
        }

        .login-header{
            text-align: center;
            margin: 20px 0 40px 0;
        }

        .login-header header {
            color: rgb(0, 0, 0);
            font-size: 30px;
            font-weight: 600px;
        }

        .info-box .input-field {
            width: 100%;
            height: 60px;
            font-size: 17px;
            padding: 0 25px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: none;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            outline: none;
            transition: .3s;
        }

        ::placeholder{
            font-weight: 500;
            color: rgb(0, 0, 0);

        }

        .input-field:focus{

            width: 105%;
        }

       .input-submit {
        position: relative;
       }

       .submit-button {
        width: 100%;
        height: 60px;
        background: rgb(0, 0, 0);
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: .3s;
       }

       .input-submit label {
        position: absolute;
        top: 45%;
        left: 50%;
        color: white;
        -webkit-transform: translate(-50%, -50%);
        -ms-transform: translate(-50%, -50%);
        cursor: pointer;
       }

       .submit-button:hover {
        background: black;
        transform: scale(1.05,1);
       }

    </style>
</head>

<body>
    <h6>NAME OF APPLICATION</h6>

    <div class="login-box">
        <div class="login-header">
            <header><b>Login</b></header>
        </div>

        <div class="info-box">
            <input type="text" class="input-field" placeholder="Email" autocomplete="off" required>
        </div>

        <div class="info-box">
            <input type="password" class="input-field" placeholder="Password" autocomplete="off" required>
        </div>

        <div class="input-submit">
            <button class="submit-button" id="submit"></button>
            <label for="submit">Sign In</label>
            
        </div>

    </div>
</body>
</html>
