<html>
<head>

    <style>

            font-family: "Outfit", sans-serif;

        .submit-button:hover {
            background: rgb(237, 27, 47);
            transform: scale(1.05,1);
        }

        h6 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);

        }

        .left-section h1.mcgill {
            color: rgb(237, 27, 47);
           
        }

         .sign-up-link {
            text-align: center;
            font-size: 15px; 
            margin-top: 20px;
        }

        .sign-up-link a{
            color: black;
            font-weight: 600;
        }

        .sign-up-link a:hover {
          
            color:red;
        }

        .back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 15px;
    border: none;
    background: black;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

.back-btn:hover {
    transition: .3s;
    background: red;
    transform: scale(1.05,1);
}

    </style>
</head>

<body>
    <h6>MyBookings</h6>
<div class="page-container">
    <div class="left-section">
        <h1 class="mcgill">Booking Application</h1>
        <p>
           Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
           Integer in lorem viverra, pellentesque eros in, fermentum 
           urna. Nulla eget lectus non mauris pretium pellentesque id 
           nec arcu. Aliquam erat volutpat. 
         
        </p>
    </div>

    <div class="right-section">
        <div class="login-box">
            <div class="login-header">
                <header><b>Login</b></header>
            </div>

             <button class="back-btn" onclick="goBack()">Back</button>


            <form id="login-form">
                <div class="info-box">
                    <input type="text" id="user" class="input-field" placeholder="Email" name="email" autocomplete="off" required>
                </div>

                <div class="info-box">
                    <input type="password" id="pass" class="input-field" placeholder="Password" name="password" autocomplete="off" required>
                </div>

                <div class="input-submit">
                    <button class="submit-button" type="submit">Sign In</button>
                </div>

                <div class="sign-up-link">
                        <p>Don't have an account? <a href="\register.html">Sign Up</a></p>
                    </div>
            </form>
        </div>
    </div>
    </div>

    
    <!--- Annie Huynh --->
    <script>
        const API_BASE = 'http://winter2026-comp307-group38.cs.mcgill.ca:3000';

        let form = document.querySelector('#login-form');
        form.addEventListener('submit', async(event) => {
            // stop page from reloading
            event.preventDefault();

            // read email/password input values
            const email = document.getElementById("user").value;
            const password = document.getElementById("pass").value;

            // send login request
            let response, data;
            try {
                response = await fetch(`${API_BASE}/api/auth/login`,
                    { method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({email, password}) });
                data = await response.json();
            } catch (err) {
                alert('Could not reach the server. Make sure the backend is running.');
                return;
            }

            if (response.ok){
                localStorage.setItem('user._id', data.id);
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);
                localStorage.setItem('email', data.email);

                window.location.href = 'dashboard.html';
            }
            else{
                alert(data.error);
                return;
            }
        });

         function goBack() {
    window.history.back();
}
    </script>
</body>
</html>
