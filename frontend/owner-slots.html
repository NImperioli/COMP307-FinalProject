    <title>Owner Slots</title>

    <style>
        * {

       body {

}
        

        .top-bar {

     color: rgb(237, 27, 47);
}

}

.top-buttons {
    display: flex;

}

.top-button {
    min-width: 100px;

}

.top-button:hover {
    background: rgb(237, 27, 47);
}

        h6 {
            text-align: center;
            font-size: 14px;

        }

       .page-header {
    display: flex;
    justify-content: center;

}

        .page-header h1 {
    font-size: 42px;

}
.page-header h1::after {
    content: "";

        .owner-info {
            margin-bottom: 28px;
            color: rgb(70, 70, 70);

        }

        .slot-card {
            background: rgb(255, 255, 255);

            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 25px;

            position: relative;

        }

        .slot-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: black;
        }

        .slot-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 7px;

        }

        .section-heading {
            font-size: 22px;
            font-weight: 700;
            color: rgb(237, 27, 47);
            margin: 30px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid rgb(240, 240, 240);
            position: relative;
            z-index: 2;
        }

        .reserve-button {
            margin-top: 14px;
            margin-right: 10px;
            width: 170px;
            height: 48px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .reserve-button:hover { background: rgb(237, 27, 47); }

        .type-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        .badge-slot  { background: rgb(220,255,220); color: rgb(30,130,30); }
        .badge-group { background: rgb(230,240,255); color: rgb(30,80,180); }

        .wave-bg {
            position: fixed;
            bottom: 0; left: 0;
            width: 200%; height: 480px;
            overflow: hidden; z-index: 0;
            pointer-events: none;
            animation: waveMove 12s linear infinite;
        }

        .wave-svg { width: 100%; height: 100%; display: block; }

        .wave-back {
            bottom: -40px; height: 620px;
            opacity: 0.45; animation-duration: 18s;
        }

        .wave-back .wave-svg {
            transform: scaleY(1.2);
            transform-origin: bottom;
        }

        @keyframes waveMove {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }



        @media (max-width: 700px) {
    .top-bar {
        width: calc(100% - 20px);
        margin: 10px;
        padding: 12px 16px;
        border-radius: 18px;
    }

  

    .top-button {
        min-width: 80px;
        height: 38px;
        font-size: 13px;
        padding: 0 14px;
    }

    body {
        padding: 110px 14px 20px 14px;
    }
}

        /* Modal - Annie Huynh */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 30px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 18px; right: 22px;
            background: none; border: none;
            font-size: 22px; cursor: pointer;
            color: black;
        }

        .modal-close:hover { color: rgb(237, 27, 47); }

        .modal-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        #voteSlotsList {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        #voteSlotsList > div {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            background: white;
        }

        #voteSlotsList p {
            color: rgb(60, 60, 60);
            margin-bottom: 6px;
            font-size: 16px;
        }

        #voteSlotsList button {
            height: 42px;
            padding: 0 18px;
            margin-top: 10px;
            background: black;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
            font-family: "Outfit", sans-serif;
        }

        #voteSlotsList button:hover { background: rgb(237, 27, 47); }

        .voted-label {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgb(220, 255, 220);
            color: rgb(30, 130, 30);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="wave-bg wave-back">
        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.3"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="wave-bg">
        <svg class="wave-svg" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path fill="rgb(237, 27, 47)" fill-opacity="0.8"
                d="M0,180 C240,150 480,210 720,180 C960,150 1200,210 1440,180 C1680,150 1920,210 2160,180 C2400,150 2640,210 2880,180 L2880,320 L0,320 Z">
            </path>
        </svg>
    </div>

    <div class="top-bar">
    <a href="landing.html" class="logo">My<span>Bookings</span></a>
    <div class="top-buttons">
        <button class="top-button" onclick="window.location.href='dashboard.html'">Back</button>
    </div>
</div>

    <div class="page-header">
    <h1>Available Slots</h1>
</div>

    <div class="owner-info">
        Showing active slots for <b id="ownerName">...</b>
    </div>

    <div id="slotsList"></div>

    <!-- Vote for meeting time - Annie Huynh -->
    <div class="modal-overlay" id="voteModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeVoteModal()">&#10005;</button>
            <h2 class="modal-title">Vote for a Meeting Time</h2>
            <div id="voteSlotsList"></div>
        </div>
    </div>

    <script>
        const API_BASE    = '';
        const id          = localStorage.getItem('user._id');
        const email       = localStorage.getItem('email');
        const role        = localStorage.getItem('role');
        const token       = localStorage.getItem('token');

        

        if (!token) {
            window.location.href = 'login.html';
        }

        const urlParams   = new URLSearchParams(window.location.search);
        const ownerId     = urlParams.get('ownerId');
        const inviteToken = urlParams.get('token');
        const ownerName   = urlParams.get('ownerName');

        if (!ownerId && !inviteToken) {
    window.location.href = 'browse-owners.html';
}

        if (ownerName) {
            document.getElementById('ownerName').textContent = decodeURIComponent(ownerName);
        }

        const slotsList = document.getElementById('slotsList');

        /* ─────────────────────────────────────────────
           LOAD SLOTS
           Filters out type="booked" slots — these are
           auto-created when a Type 1 meeting request is
           approved and should NOT appear as reservable
           slots to other users.
        ───────────────────────────────────────────── */
        async function loadSlots() {
            const url = inviteToken
    ? `${API_BASE}/api/slots/token/${inviteToken}`
    : `${API_BASE}/api/slots/owner/${ownerId}/active`;

            const response = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await response.json();

            slotsList.innerHTML = '';

            if (!response.ok) {
                slotsList.innerHTML = `<p style="color:red;position:relative;z-index:2;">Failed to load slots: ${data.error || response.status}</p>`;
                return;
            }

            // Filter out "booked" type slots —> these are approved Type 1 meeting
            // requests auto-inserted into the slots collection. They already have a
            // specific user booked and must not be shown as available for reservation.
            let reservableSlots = Array.isArray(data)
    ? data.filter(s => s.type !== 'booked')
    : [];



console.log(data);

            if (reservableSlots.length === 0) {
                slotsList.innerHTML = `<p style="color:gray;position:relative;z-index:2;">No active slots available for this owner.</p>`;
            } else {
                const heading = document.createElement('h2');
                heading.classList.add('section-heading');
                heading.textContent = 'Available Booking Slots';
                slotsList.appendChild(heading);

                for (const slot of reservableSlots) {
                    renderSlotCard(slot);
                }
            }

            if (reservableSlots.length > 0) {
                const slotIds = reservableSlots.map(s => s._id);
                try {
                    const checkRes = await fetch(`${API_BASE}/api/slots/reservations/check`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ slotIds, userId: id })
                    });
                    const reservedMap = await checkRes.json();

                    // For each slot card, update based on reservedMap
                    reservableSlots.forEach(slot => {
                    if (reservedMap[slot._id]) {
                        markSlotAsReserved(slot._id);
                    }
                    });
                } catch (e) { /* non-critical, skip */ }
            }

            // Load open group meeting votes separately (only when browsing by ownerId,
            // not via an invite token which is slot-specific)
            if (ownerId) {
                await loadGroupMeetingVotes();
            }
        }

        function markSlotAsReserved(slotId) {
            // We store a data-slotid on each card's reserve button for easy lookup
            const btn = document.querySelector(`button[data-slotid="${slotId}"]`);
            if (!btn) return;

            btn.disabled = true;
            btn.textContent = 'Already Reserved';
            btn.style.cssText = 'background:#555;cursor:not-allowed;opacity:0.7;';

            // Add a badge to the card
            const card = btn.closest('.slot-card');
            if (card) {
                const badge = document.createElement('span');
                badge.style.cssText = `display:inline-block;background:#fef3c7;color:#92400e;
                font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;
                margin-bottom:10px;letter-spacing:0.04em;`;
                badge.textContent = '⚠ Already Booked';
                card.insertBefore(badge, card.firstChild);
                card.style.opacity = '0.75';
            }
        }

        /* ─────────────────────────────────────────────
           LOAD GROUP MEETING VOTES
           Fetches the owner's Type 2 bookings that are
           still collecting_votes so users can vote.
           Uses the owner appointments endpoint
           (authenticateAnyToken) then cross-checks
           the booking status via the votes endpoint.
        ───────────────────────────────────────────── */
        async function loadGroupMeetingVotes() {
            let openBookingIds = [];

            try {
                const apptRes = await fetch(`${API_BASE}/api/bookings/group/open/owner/${ownerId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!apptRes.ok) return; // silently skip if forbidden

                const apptData = await apptRes.json();

                // Extract unique bookingIds from type2 appointments
                const seenBookingIds = new Set();
                for (const appt of apptData) {
                    const bid = appt._id ? appt._id.toString() : null;
                    if (bid && !seenBookingIds.has(bid)) {
                        seenBookingIds.add(bid);
                        openBookingIds.push(bid);
                    }
                }
            } catch (e) {
                return; // appointments endpoint unavailable, skip group meetings
            }

            // For each bookingId, attempt to fetch votes —> if the booking is still
            // in collecting_votes state the endpoint returns vote data, otherwise it
            // returns the slots with votes (finalized bookings still return data but
            // the booking record will have status "approved")
            const openMeetings = [];
            for (const bookingId of openBookingIds) {
                renderGroupVoteCard(bookingId.toString());
            }

            // If arrived via a direct invite link with bookingId, open vote modal immediately
            // (handled after loadSlots returns, see bottom of script)
        }

        /* ─────────────────────────────────────────────
           RENDER A RESERVABLE SLOT CARD
        ───────────────────────────────────────────── */
        function renderSlotCard(slot) {
            const newDiv = document.createElement('div');
            newDiv.classList.add('slot-card');

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-slot');
            badge.textContent = slot.type === 'recurring' ? 'Recurring Slot' : 'Booking Slot';
            newDiv.appendChild(badge);

            const heading = document.createElement('h3');
            heading.textContent = slot.title;
            newDiv.appendChild(heading);

            const time = document.createElement('p');
            time.textContent = 'Time: '
                + new Date(slot.startTime).toLocaleString()
                + ' — '
                + new Date(slot.endTime).toLocaleString();
            newDiv.appendChild(time);

            const buttonDiv = document.createElement('div');

            if (role !== "owner") {
                const reserveBtn = document.createElement('button');
                reserveBtn.classList.add('reserve-button');
                reserveBtn.textContent = 'Reserve Slot';
                reserveBtn.setAttribute('data-slotid', slot._id);

                reserveBtn.onclick = async () => {
                    const response = await fetch(`${API_BASE}/api/slots/reserve`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ slotId: slot._id, userId: id, userEmail: email })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        if (data.notifyOwner) window.location.href = data.notifyOwner;
                        else window.location.href = 'dashboard.html';
                    } else {
                        alert(data.error);
                    }
                };

                buttonDiv.appendChild(reserveBtn);
            }

            const messageOwner = document.createElement('button');
            messageOwner.classList.add('reserve-button');
            messageOwner.textContent = 'Message Owner';
            messageOwner.onclick = async () => {
                const response = await fetch(`${API_BASE}/api/slots/${slot._id}/message-owner`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                if (response.ok) window.location.href = data.mailto;
                else alert(data.error);
            };
            buttonDiv.appendChild(messageOwner);

            newDiv.appendChild(buttonDiv);
            slotsList.appendChild(newDiv);
        }

        /* ─────────────────────────────────────────────
           GROUP MEETING VOTE SECTION
           Rendered when arriving via direct invite URL
           that includes ?bookingId=... &openVote=true
        ───────────────────────────────────────────── */
        async function renderGroupVoteCard(bookingId) {
            // Fetch vote data to get meeting title and window info
            const voteRes = await fetch(`${API_BASE}/api/bookings/group/${bookingId}/votes`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!voteRes.ok) return;
            const slots = await voteRes.json();

            if (!Array.isArray(slots) || slots.length === 0) return;

            const heading = document.createElement('h2');
            heading.classList.add('section-heading');
            heading.textContent = 'Group Meeting — Vote for a Time';
            slotsList.appendChild(heading);

            const card = document.createElement('div');
            card.classList.add('slot-card');

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-group');
            badge.textContent = 'Group Meeting';
            card.appendChild(badge);

            const title = document.createElement('h3');
            title.textContent = 'Select your preferred meeting time';
            card.appendChild(title);

            const note = document.createElement('p');
            note.textContent = 'Vote for one or more times that work for you. The organizer will finalize the best time.';
            card.appendChild(note);

            if (role !== "owner") {
                const voteBtn = document.createElement('button');
                voteBtn.classList.add('reserve-button');
                voteBtn.textContent = 'Vote on Times';
                voteBtn.onclick = () => openVoteModal(bookingId);
                card.appendChild(voteBtn);
            }

            slotsList.appendChild(card);
        }

        /* ─────────────────────────────────────────────
           VOTING MODAL
        ───────────────────────────────────────────── */
        let voteBookingId = null;

        function openVoteModal(bookingId) {
            voteBookingId = bookingId;
            document.getElementById('voteModal').classList.add('active');
            loadVoteSlots();
        }

        function closeVoteModal() {
            document.getElementById('voteModal').classList.remove('active');
        }

        async function loadVoteSlots() {
            const response = await fetch(`${API_BASE}/api/bookings/group/${voteBookingId}/votes`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            const list = document.getElementById('voteSlotsList');
            list.innerHTML = '';

            if (!response.ok) {
                list.innerHTML = `<p style="color:red">${data.error || 'Failed to load vote slots'}</p>`;
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                list.innerHTML = '<p style="color:gray">No time slots available to vote on.</p>';
                return;
            }

            for (const slot of data) renderVoteSlot(slot);
        }

        function renderVoteSlot(slot) {
            const list   = document.getElementById('voteSlotsList');
            const newDiv = document.createElement('div');

            const time = document.createElement('p');
            time.textContent = 'Time: ' + new Date(slot.time).toLocaleString();
            newDiv.appendChild(time);

            const votes = document.createElement('p');
            votes.textContent = 'Current votes: ' + slot.votes;
            newDiv.appendChild(votes);

            const alreadyVoted = Array.isArray(slot.voters) && slot.voters.includes(id);

            if (alreadyVoted) {
                const votedLabel = document.createElement('span');
                votedLabel.classList.add('voted-label');
                votedLabel.textContent = '✓ You voted for this';
                newDiv.appendChild(votedLabel);
            } else {
                const voteBtn = document.createElement('button');
                voteBtn.textContent = 'Vote for this time';
                voteBtn.onclick = async () => {
                    const response = await fetch(`${API_BASE}/api/bookings/group/vote`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({
                            bookingId: voteBookingId,
                            userId: id,
                            slotTimes: [slot.time]
                        })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        alert('Vote submitted!');
                        loadVoteSlots();
                    } else {
                        alert(data.error);
                    }
                };
                newDiv.appendChild(voteBtn);
            }

            list.appendChild(newDiv);
        }

        /* ─────────────────────────────────────────────
           INIT
        ───────────────────────────────────────────── */
        async function init() {
            await loadSlots();

            // If a specific bookingId was passed in the URL (e.g. via owner's share link),
            // render the group vote card and auto-open the vote modal.
            const directBookingId = urlParams.get('bookingId');
            if (directBookingId) {
                await renderGroupVoteCard(directBookingId);
                if (urlParams.get('openVote') === 'true') {
                    openVoteModal(directBookingId);
                }
            }
        }

        init();
    </script>
</body>
