<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Owner Slots</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 30px 40px;
        }

        h6 {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .page-header h1 {
            font-size: 42px;
            color: rgb(237, 27, 47);
        }

        .back-button {
            width: 130px;
            height: 50px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .back-button:hover {
            background: rgb(237, 27, 47);
        }

        .owner-info {
            margin-bottom: 28px;
            color: rgb(70, 70, 70);
            font-size: 18px;
        }

        .slot-card {
            background: rgb(255, 255, 255);
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 25px;
            margin-bottom: 20px;
        }

        .slot-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: black;
        }

        .slot-card p {
            color: rgb(70, 70, 70);
            margin-bottom: 7px;
            font-size: 16px;
        }

        .section-heading {
            font-size: 22px;
            font-weight: 700;
            color: rgb(237, 27, 47);
            margin: 30px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid rgb(240, 240, 240);
        }

        .reserve-button {
            margin-top: 14px;
            margin-right: 10px;
            width: 170px;
            height: 48px;
            background: black;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .reserve-button:hover {
            background: rgb(237, 27, 47);
        }


.wave-bg {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 480px;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
    animation: waveMove 12s linear infinite;
}

.wave-svg {
    width: 100%;
    height: 100%;
    display: block;
}

.wave-back {
    bottom: -40px;
    height: 620px;
    opacity: 0.45;
    animation-duration: 18s;
}

.wave-back .wave-svg {
    transform: scaleY(1.2);   /* makes it taller */
    transform-origin: bottom; /* grows upward */
}

@keyframes waveMove {
    from {
        transform: translateX(0);
    }
    to {
        transform: translateX(-50%);
    }
}





        /* Modal - Annie Huynh */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 30px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: black;
        }

        .modal-close:hover {
            color: rgb(237, 27, 47);
        }

        .modal-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        #voteSlotsList {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        #voteSlotsList > div {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            background: white;
        }

        #voteSlotsList p {
            color: rgb(60, 60, 60);
            margin-bottom: 6px;
            font-size: 16px;
        }

        #voteSlotsList button {
            height: 42px;
            padding: 0 18px;
            margin-top: 10px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        #voteSlotsList button:hover {
            background: rgb(237, 27, 47);
        }

        .voted-label {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgb(220, 255, 220);
            color: rgb(30, 130, 30);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>
   <h6><a href="landing.html" style="text-decoration: none;">MyBookings</a></h6>

    <div class="page-header">
        <h1>Available Slots</h1>
        <button class="back-button" onclick="window.location.href='browse-owners.html'">Back</button>
    </div>

    <div class="owner-info">
        Showing active slots for <b id="ownerName">...</b>
    </div>

    <div id="slotsList"></div>

    <!-- Vote for meeting time - Annie Huynh -->
    <div class="modal-overlay" id="voteModal">
        <div class="modal-box">    
            <button class="modal-close" onclick="closeVoteModal()">&#10005;</button>
            <h2 class="modal-title">Vote for a Meeting Time</h2>
            <div id="voteSlotsList"></div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const id = localStorage.getItem('user._id');
        const email = localStorage.getItem('email');
        const role = localStorage.getItem('role');

         
        // read token and redirect if its missing
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const ownerId = urlParams.get('ownerId');
        const inviteToken = urlParams.get('token');
        const ownerName = urlParams.get('ownerName');

        if (!ownerId && !inviteToken) {
            window.location.href = 'browse-owners.html';
        }

        if (ownerName) {
            document.getElementById('ownerName').textContent = decodeURIComponent(ownerName);
        }

        const slotsList = document.getElementById('slotsList');

        async function loadSlots() {
            const url = inviteToken
                ? `${API_BASE}/api/slots/token/${inviteToken}`
                : `${API_BASE}/api/slots/owner/${ownerId}/active`;

            const response = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await response.json();

            slotsList.innerHTML = '';

            if (!response.ok) {
                slotsList.innerHTML = `<p style="color:red">Failed to load slots: ${data.error || response.status}</p>`;
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                slotsList.innerHTML = `<p style="color:gray">No active slots available for this owner.</p>`;
            } else {
                const heading = document.createElement('h2');
                heading.classList.add('section-heading');
                heading.textContent = 'Available Booking Slots';
                slotsList.appendChild(heading);
            }

            for (const slot of data) {
                renderSlotCard(slot);
            }

            // FIX 5: Load group meetings for ALL authenticated users (not just owners)
            if (ownerId) {
                await loadGroupMeetings();
            }
        }

        loadSlots();

        async function loadGroupMeetings() {
            // Try fetching owner appointments works if backend uses authenticateAnyToken
            // If it returns 403, fall back gracefully
            let openMeetings = [];

            try {
                const response = await fetch(`${API_BASE}/api/bookings/appointments/owner/${ownerId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    const data = await response.json();
                    // Show group meetings still collecting votes
                    openMeetings = (data.type2 || []).filter(b => b.status === 'collecting_votes');
                } else if (response.status === 403) {
                    // Student hitting owner-only endpoint — backend fix needed
                    // Silently skip rather than show error
                    console.warn('Group meetings endpoint requires owner token — ask admin to update route to authenticateAnyToken');
                    return;
                }
            } catch (e) {
                console.error('Failed to load group meetings', e);
                return;
            }

            if (openMeetings.length === 0) return;

            const heading = document.createElement('h2');
            heading.classList.add('section-heading');
            heading.textContent = 'Group Meeting Votes';
            slotsList.appendChild(heading);

            for (const meeting of openMeetings) {
                const card = document.createElement('div');
                card.classList.add('slot-card');

                const badge = document.createElement('span');
                badge.classList.add('type-badge', 'badge-group');
                badge.textContent = 'Group Meeting';
                card.appendChild(badge);

                const title = document.createElement('h3');
                title.textContent = meeting.title || 'Group Meeting';
                card.appendChild(title);

                const window_open = new Date(meeting.opensAt).toLocaleString();
                const window_close = new Date(meeting.closesAt).toLocaleString();
                const period = document.createElement('p');
                period.textContent = `Voting window: ${window_open} → ${window_close}`;
                card.appendChild(period);

                const now = new Date();
                const isOpen = now >= new Date(meeting.opensAt) && now <= new Date(meeting.closesAt);
                const statusP = document.createElement('p');
                statusP.textContent = isOpen ? '✅ Voting is currently open' : '⏳ Voting window not active';
                statusP.style.color = isOpen ? 'rgb(30, 130, 30)' : 'rgb(150, 100, 0)';
                card.appendChild(statusP);

                if (isOpen) {
                    const voteBtn = document.createElement('button');
                    voteBtn.classList.add('reserve-button');
                    voteBtn.textContent = 'Vote on Times';
                    voteBtn.onclick = () => openVoteModal(meeting._id || meeting.bookingId);
                    card.appendChild(voteBtn);
                }

                slotsList.appendChild(card);
            }
        }

        function renderSlotCard(slot) {
            const newDiv = document.createElement("div");
            newDiv.classList.add("slot-card");

            const badge = document.createElement('span');
            badge.classList.add('type-badge', 'badge-slot');
            badge.textContent = slot.type === 'recurring' ? 'Recurring Slot' : 'Booking Slot';
            newDiv.appendChild(badge);

            const heading = document.createElement("h3");
            heading.textContent = slot.title;
            newDiv.appendChild(heading);

            const time = document.createElement("p");
            const startTime = new Date(slot.startTime).toLocaleString();
            const endTime = new Date(slot.endTime).toLocaleString();
            time.textContent = "Time: " + startTime + " — " + endTime;
            newDiv.appendChild(time);

            const buttonDiv = document.createElement("div");

            const reserveSlot = document.createElement("button");
            reserveSlot.classList.add("reserve-button");
            reserveSlot.textContent = "Reserve Slot";
            buttonDiv.appendChild(reserveSlot);
            reserveSlot.onclick = async () => {
                const response = await fetch(`${API_BASE}/api/slots/reserve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ slotId: slot._id, userId: id, userEmail: email })
                });
                const data = await response.json();
                if (response.ok) {
                    if (data.notifyOwner) {
                        window.location.href = data.notifyOwner;
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alert(data.error);
                }
            };

            const messageOwner = document.createElement("button");
            messageOwner.classList.add("reserve-button");
            messageOwner.textContent = "Message Owner";
            buttonDiv.appendChild(messageOwner);
            messageOwner.onclick = async () => {
                const response = await fetch(`${API_BASE}/api/slots/${slot._id}/message-owner`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.mailto;
                } else {
                    alert(data.error);
                }
            };

            newDiv.appendChild(buttonDiv);
            slotsList.appendChild(newDiv);
        }

        // Voting modal
        let voteBookingId = null;

        function openVoteModal(bookingId) {
            voteBookingId = bookingId;
            document.getElementById('voteModal').classList.add('active');
            loadVoteSlots();
        }

        function closeVoteModal() {
            document.getElementById('voteModal').classList.remove('active');
        }

        async function loadVoteSlots() {
            const response = await fetch(`${API_BASE}/api/bookings/group/${voteBookingId}/votes`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            const list = document.getElementById('voteSlotsList');
            list.innerHTML = '';
            if (!response.ok) {
                list.innerHTML = `<p style="color:red">${data.error || 'Failed to load vote slots'}</p>`;
                return;
            }
            if (!Array.isArray(data) || data.length === 0) {
                list.innerHTML = '<p style="color:gray">No time slots available to vote on.</p>';
                return;
            }
            for (const slot of data) renderVoteSlot(slot);
        }

        function renderVoteSlot(slot) {
            const list = document.getElementById('voteSlotsList');
            const newDiv = document.createElement("div");

            const time = document.createElement("p");
            time.textContent = "Time: " + new Date(slot.time).toLocaleString();
            newDiv.appendChild(time);

            const votes = document.createElement("p");
            votes.textContent = "Current votes: " + slot.votes;
            newDiv.appendChild(votes);

            // FIX 5: Check if user already voted for this slot
            const alreadyVoted = slot.voters && slot.voters.includes(id);

            if (alreadyVoted) {
                const votedLabel = document.createElement("span");
                votedLabel.classList.add("voted-label");
                votedLabel.textContent = "✓ You voted for this";
                newDiv.appendChild(votedLabel);
            } else {
                const voteBtn = document.createElement("button");
                voteBtn.textContent = "Vote for this time";
                voteBtn.onclick = async () => {
                    const response = await fetch(`${API_BASE}/api/bookings/group/vote`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ bookingId: voteBookingId, userId: id, slotTimes: [slot.time] })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        alert('Vote submitted!');
                        loadVoteSlots();
                    } else {
                        alert(data.error);
                    }
                };
                newDiv.appendChild(voteBtn);
            }

            list.appendChild(newDiv);
        }

        // auto-open vote modal if URL has openVote=true
        const params = new URLSearchParams(window.location.search);
        if (params.get('openVote') === 'true' && params.get('bookingId')) {
            openVoteModal(params.get('bookingId'));
        }
    </script>
</body>
</html>
