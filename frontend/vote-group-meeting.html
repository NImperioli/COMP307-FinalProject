<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Vote Group Meeting</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            min-height: 100vh;
            background: rgb(255, 255, 255);
            padding: 30px 40px;
        }

        h6 {
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .page-header h1 {
            font-size: 42px;
            color: rgb(237, 27, 47);
        }

        .back-button {
            width: 130px;
            height: 50px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        .back-button:hover {
            background: rgb(237, 27, 47);
        }

        .main-panel {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0px 5px 10px 1px rgb(146, 146, 146);
            padding: 30px;
        }

        .panel-title {
            font-size: 28px;
            margin-bottom: 20px;
            color: black;
        }

        #slotsList {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        #slotsList > div {
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0px 3px 8px 1px rgb(220, 220, 220);
            background: white;
        }

        #slotsList p {
            color: rgb(60, 60, 60);
            margin-bottom: 6px;
            font-size: 16px;
        }

        #slotsList button {
            height: 42px;
            padding: 0 18px;
            margin-top: 10px;
            background: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        #slotsList button:hover {
            background: rgb(237, 27, 47);
        }
    </style>
</head>

<body>
    <h6>MyBookings</h6>

    <div class="page-header">
        <h1>Vote Meeting</h1>
        <button class="back-button" onclick="window.location.href='dashboard.html'">Back</button>
    </div>

    <div class="main-panel">
        <h2 class="panel-title">Vote for a Meeting Time</h2>
        <div id="slotsList"></div>
    </div>

        <script>
            const API_BASE = window.location.origin;
            // check token and id, redirect if missing
            const token = localStorage.getItem('token');
            const id = localStorage.getItem('user._id');
            if (!token || !id) {
                window.location.href = 'login.html';
            }
        
        loadSlots();

        // render a card for each proposed slot
        function renderSlot(slot) {
            const newDiv = document.createElement("div");

            const time = document.createElement("p");
            time.textContent = "Time: " + new Date(slot.time).toLocaleString();
            newDiv.appendChild(time);

            // fetch proposed slots and their vote counts
            async function loadSlots() {
                const response = await fetch(`${API_BASE}/api/bookings/group/${bookingId}/votes`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Vote submitted!');
                    loadSlots(); // refresh to show updated counts
                } else {
                    alert(data.error);
                }
            };
            newDiv.appendChild(voteBtn);

            // render a card for each proposed slot
            function renderSlot(slot) {
                const newDiv = document.createElement("div");

                const time = document.createElement("p");
                time.textContent = "Time: " + new Date(slot.time).toLocaleString();
                newDiv.appendChild(time);

                const votes = document.createElement("p");
                votes.textContent = "Votes: " + slot.votes;
                newDiv.appendChild(votes);

                const voteBtn = document.createElement("button");
                voteBtn.textContent = "Vote";
                voteBtn.onclick = async () => {
                    const response = await fetch(`${API_BASE}/api/bookings/group/vote`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ bookingId, userId: id, slotTimes: [slot.time] })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        alert('Vote submitted!');
                        loadSlots(); // refresh to show updated counts
                    } else {
                        alert(data.error);
                    }
                };
                newDiv.appendChild(voteBtn);

                slotsList.appendChild(newDiv);
            }
        </script>
    </body>
</html>
