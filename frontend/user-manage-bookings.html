<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Bookings</title>
</head>
<body>
    <button onclick="createSlot('Evil office hours', Date.parse('2026-06-06'), Date.parse('2026-06-07'))">Create</button>

    <div id="slot_container">

    </div>

</body>

<script>
    // wb 261143451
    //Owner-only page.
    // List automatically, Create, Delete, edit
    // from AH: Read the JWT from localStorage
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const id = localStorage.getItem('user._id');

    // redirect to login page if token is missing
    if (!token){
        window.location.href = 'login.html'
    }
    else if (role !== "student"){
        window.location.href = 'dashboard.html'
        // could put a 403 page instead? idk
    }

    const url = `http://localhost:3000/api/`
    const slot_container = document.getElementById("slot_container")

    async function renderBookings(options={range:[Date.now(), Date.parse("2099-12-31")]}){
        slot_container.innerHTML = "";
        const response = await fetch(url + `slots/my-reservations/${id}`, {
            method: 'GET',
            headers: { "Authorization": 'Bearer ' + token },
            cache: 'no-store'
        });

        const data = await response.json();
        console.log(data);

        const filtered = [];
        for (let booking of data){
            console.log(booking.title);
            if(Date.parse(booking.endTime) < options.range[0] || Date.parse(booking.startTime) > options.range[1]){
                continue;
            }
            filtered.push(booking);
        }
        for (let slot of filtered){
            renderSlot(slot);
        }
    }

    async function renderBookingRequests(options={range:[Date.now(), Date.parse("2099-12-31")]}){
        slot_container.innerHTML = "";
        const response = await fetch(url + `booking/requests/user/${id}`, {
            method: 'GET',
            headers: { "Authorization": 'Bearer ' + token },
            cache: 'no-store'
        });

        const data = await response.json();
        console.log(data);

        const filtered = [];
        for (let booking of data){
            console.log(booking.title);
            if(Date.parse(booking.endTime) < options.range[0] || Date.parse(booking.startTime) > options.range[1]){
                continue;
            }
            filtered.push(booking);
        }
        for (let slot of filtered){
            renderSlot(slot);
        }
    }

    function renderSlot(slot_data){
        let new_slot = document.createElement("div");
        const string = slot_data.title + "; " + slot_data.status;
        new_slot.innerText=`${string}`;
        let del = document.createElement("button");
        del.innerText="x";
        del.onclick = () => {deleteSlot(slot_data._id)};
        new_slot.appendChild(del);
        let act = document.createElement("button");
        act.innerText="a";
        act.onclick = () => {activate(slot_data._id)};
        new_slot.appendChild(act);
        let dea = document.createElement("button");
        dea.innerText="d";
        dea.onclick = () => {deactivate(slot_data._id)};
        new_slot.appendChild(dea);
        // actual design should be added here
        slot_container.appendChild(new_slot);
    }

    async function cancelBooking(idd){
        // might need to be reworked to make it a better endpoint for a form
        let slot = await fetch(url + "slot/cancel", {
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'

            },
            method: 'POST',
            body: JSON.stringify({ownerId: id})
        })
        let response = await slot.json();

        console.log("Slot created: ", response);

    }

    renderBookings();
    renderBookingRequests();

</script>

</html>
